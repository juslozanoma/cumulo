<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumulo IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 560px;
            text-align: center;
        }

        .logo {
            width: 220px;
            height: 220px;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 16px;
        }

        .welcome-msg {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .api-setup {
            background: #1a1f2a;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 3px solid #f59e0b;
            transition: all 0.3s ease;
        }

        .api-setup.hidden {
            display: none;
        }

        .api-setup input {
            width: 100%;
            padding: 10px 12px;
            background: #0f1419;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
        }

        .api-setup input::placeholder {
            color: #666;
        }

        .api-success {
            display: none;
            background: #1a2f1a;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 3px solid #10b981;
            color: #10b981;
            font-size: 15px;
            font-weight: 500;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
        }

        .api-success.show {
            display: flex;
        }

        .api-success svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .api-error {
            display: none;
            background: #2a1a1a;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 3px solid #ff6b6b;
            color: #ff6b6b;
            font-size: 15px;
            font-weight: 500;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
        }

        .api-error.show {
            display: flex;
        }

        .api-error svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        #query {
            width: 100%;
            padding: 16px 52px 16px 18px;
            background: #14181f;
            border: 1px solid #2a2f3a;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        #query:focus {
            outline: none;
            border-color: #0d7ee6;
        }

        #query::placeholder {
            color: #666;
        }

        #searchBtn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 38px;
            height: 38px;
            padding: 0;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        #searchBtn:hover {
            background: #1f2530;
            color: #0d7ee6;
        }

        #searchBtn svg {
            width: 18px;
            height: 18px;
        }

        .results {
            display: none;
            margin-top: 30px;
            text-align: left;
        }

        .results.show {
            display: block;
        }

        .result-item {
            background: #1e2330;
            padding: 18px;
            margin-bottom: 14px;
            border-radius: 8px;
            border-left: 4px solid #10b981;
            animation: slideIn 0.3s ease-out;
            color: #e8e8e8;
            line-height: 1.7;
        }

        .result-item.source {
            border-left-color: #8b5cf6;
        }

        .result-item.answer {
            border-left-color: #10b981;
            font-size: 15px;
        }

        .result-item strong {
            color: #fff;
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .result-item p {
            color: #ccc;
            line-height: 1.7;
            margin-bottom: 6px;
        }

        .result-item h1, .result-item h2, .result-item h3 {
            color: #fff;
            margin: 12px 0 8px 0;
            font-size: 16px;
        }

        .result-item ul, .result-item ol {
            margin: 8px 0 8px 20px;
            color: #ccc;
        }

        .result-item li {
            margin-bottom: 4px;
        }

        .result-item b, .result-item strong.inline {
            color: #fff;
            font-weight: 600;
        }

        .meta {
            font-size: 12px;
            color: #777;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #333;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 15px;
        }

        .error {
            color: #ff6b6b;
            background: #2a1a1a;
            padding: 16px;
            border-radius: 6px;
            border-left: 4px solid #ff6b6b;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #888;
        }

        .no-results strong {
            display: block;
            font-size: 17px;
            margin-bottom: 6px;
            color: #ccc;
        }

        .btn-more {
            display: inline-block;
            margin-top: 14px;
            padding: 8px 18px;
            background: #2a2f3a;
            color: #0d7ee6;
            border: 1px solid #2a2f3a;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-more:hover {
            background: #1f2530;
            border-color: #0d7ee6;
        }

        .detail-box {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #333;
        }

        .detail-box.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .detail-box h4 {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-chunk {
            background: #161b26;
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid;
            font-size: 13px;
            color: #bbb;
            line-height: 1.6;
        }

        .detail-chunk .chunk-header {
            color: #888;
            font-size: 11px;
            margin-bottom: 6px;
            display: flex;
            gap: 12px;
        }

        .detail-chunk .chunk-text {
            color: #ccc;
            white-space: pre-wrap;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="icon.png" alt="Cumulo" onerror="this.style.display='none'">
        </div>

        <div class="welcome-msg" id="welcomeMsg">
            Bienvenido, por favor ingresa tu código de acceso para continuar.
        </div>

        <div class="api-setup" id="apiSetup">
            <input type="password" id="apiKey" placeholder="Escribe el código de acceso...">
        </div>

        <div class="api-success" id="apiSuccess">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            Autenticación correcta
        </div>

        <div class="api-error" id="apiError">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
            Acceso denegado
        </div>

        <div class="search-box">
            <input type="text" id="query" placeholder="Pregunta sobre decisiones, actas o procesos de Cumulo">
            <button id="searchBtn" onclick="search()" aria-label="Buscar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>

        <div id="results" class="results"></div>
    </div>

    <script>
        let knowledgeBase = [];
        let isAuthenticated = false;
        let lastRelevantChunks = [];

        async function loadKB() {
            try {
                const res = await fetch('kb.json');
                knowledgeBase = await res.json();
                console.log('Cargados ' + knowledgeBase.length + ' chunks');
            } catch (e) {
                console.error('Error cargando KB:', e);
            }
        }

        function findRelevantChunks(query) {
            const queryWords = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);

            return knowledgeBase
                .map(chunk => {
                    let score = 0;
                    const text = chunk.text.toLowerCase();
                    const filename = chunk.filename.toLowerCase();

                    queryWords.forEach(word => {
                        const matches = (text.match(new RegExp(word, 'g')) || []).length;
                        score += matches;
                        if (filename.includes(word)) score += 5;
                    });

                    // Bonus por fecha más reciente
                    if (chunk.date) {
                        const dateVal = new Date(chunk.date).getTime();
                        if (!isNaN(dateVal)) {
                            const now = Date.now();
                            const daysDiff = (now - dateVal) / (1000 * 60 * 60 * 24);
                            if (daysDiff < 365) score += 3;
                            if (daysDiff < 90) score += 5;
                            if (daysDiff < 30) score += 8;
                        }
                    }

                    return { chunk, score };
                })
                .filter(x => x.score > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, 5)
                .map(x => x.chunk);
        }

        async function verifyApiKey(apiKey) {
            try {
                const testPrompt = 'Responde únicamente "OK".';
                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: testPrompt }] }]
                        })
                    }
                );
                return response.ok;
            } catch (e) {
                return false;
            }
        }

        function formatMarkdown(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong class="inline">$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
                .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
                .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
                .replace(/^-\s+(.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.+<\/li>\n?)+/g, '<ul>$&</ul>')
                .replace(/\n/g, '<br>');
        }

        function countWords(text) {
            return text.trim().split(/\s+/).length;
        }

        function toggleDetails(btnId, boxId) {
            const box = document.getElementById(boxId);
            const btn = document.getElementById(btnId);
            if (box.classList.contains('show')) {
                box.classList.remove('show');
                btn.textContent = 'Más información';
            } else {
                box.classList.add('show');
                btn.textContent = 'Menos información';
            }
        }

        async function search() {
            const query = document.getElementById('query').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const apiSetup = document.getElementById('apiSetup');
            const apiSuccess = document.getElementById('apiSuccess');
            const apiError = document.getElementById('apiError');
            const welcomeMsg = document.getElementById('welcomeMsg');
            const resultsEl = document.getElementById('results');

            // Si no está autenticado y no hay API key
            if (!isAuthenticated && !apiKey) {
                resultsEl.innerHTML = '<div class="result-item answer"><strong>Acceso denegado</strong><p>Este documento contiene información confidencial. Solicita el código e intenta nuevamente.</p></div>';
                resultsEl.classList.add('show');
                return;
            }

            // Si no está autenticado pero hay API key, verificar
            if (!isAuthenticated && apiKey) {
                const valid = await verifyApiKey(apiKey);
                if (valid) {
                    isAuthenticated = true;
                    apiSetup.classList.add('hidden');
                    welcomeMsg.style.display = 'none';
                    apiSuccess.classList.add('show');
                    apiError.classList.remove('show');
                } else {
                    apiError.classList.add('show');
                    apiSuccess.classList.remove('show');
                    resultsEl.innerHTML = '<div class="result-item answer"><strong>Acceso denegado</strong><p>Este documento contiene información confidencial. Solicita el código e intenta nuevamente.</p></div>';
                    resultsEl.classList.add('show');
                    return;
                }
            }

            // Si ya está autenticado y no hay pregunta
            if (isAuthenticated && !query) {
                resultsEl.innerHTML = '<div class="result-item answer"><strong>¿Qué puedo investigar en este buscador?</strong><p>Este buscador te permite consultar información sobre <strong>decisiones, actas y procesos del grupo de astronomía Cúmulo</strong>. Puedes preguntar sobre reuniones, acuerdos, eventos, proyectos y cualquier documento relevante de la organización.</p></div>';
                resultsEl.classList.add('show');
                return;
            }

            if (!query) return;

            resultsEl.innerHTML = '<div class="loading">Buscando...</div>';
            resultsEl.classList.add('show');

            try {
                const relevantChunks = findRelevantChunks(query);
                lastRelevantChunks = relevantChunks;

                if (relevantChunks.length === 0) {
                    resultsEl.innerHTML =
                        '<div class="no-results"><strong>No encontré documentos relevantes.</strong><p>Intenta con otras palabras clave.</p></div>';
                    return;
                }

                const context = relevantChunks
                    .map(c => '[' + c.folder + ' - ' + c.date + ']\n' + c.text)
                    .join('\n\n---DOCUMENTO SIGUIENTE---\n\n');

                const prompt = 'Eres un asistente experto en los procesos, decisiones y documentos del grupo de astronomia Cumulo. Analiza los documentos proporcionados y responde de forma breve (menos de 50 palabras) como un análisis conciso basado en la información. Prioriza la información más reciente si hay datos repetidos.\n\nDOCUMENTOS RELEVANTES:\n' + context + '\n\nPREGUNTA DEL USUARIO: ' + query + '\n\nINSTRUCCIONES:\n1. Responde con un análisis breve (menos de 50 palabras) basado ÚNICAMENTE en los documentos\n2. Prioriza la información más reciente\n3. Si la información no está, di "No encontré información"';

                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    }
                );

                const data = await response.json();

                if (!response.ok) {
                    throw new Error((data.error && data.error.message) || 'Error');
                }

                let answer = (data.candidates && data.candidates[0] &&
                    data.candidates[0].content.parts[0].text) || 'No pude generar respuesta';

                // Truncar a ~50 palabras si es necesario
                const words = answer.split(/\s+/);
                if (words.length > 55) {
                    answer = words.slice(0, 50).join(' ') + '...';
                }

                const answerHtml = formatMarkdown(answer);

                const colors = ['#10b981', '#0d7ee6', '#f59e0b', '#8b5cf6', '#ec4899'];

                let html = '<div class="result-item answer"><strong>Respuesta</strong><p>' + answerHtml + '</p>';
                html += '<button class="btn-more" id="btnMore" onclick="toggleDetails(\'btnMore\', \'detailBox\')">Más información</button>';
                html += '<div class="detail-box" id="detailBox">';
                html += '<h4>Fragmentos de documentos</h4>';

                relevantChunks.forEach((chunk, i) => {
                    const color = colors[i % colors.length];
                    html += '<div class="detail-chunk" style="border-left-color:' + color + '">' +
                        '<div class="chunk-header"><span>' + chunk.filename + '</span><span>' + chunk.folder + '</span><span>' + chunk.date + '</span></div>' +
                        '<div class="chunk-text">' + chunk.text.replace(/\n/g, '<br>') + '</div>' +
                        '</div>';
                });

                html += '</div></div>';

                resultsEl.innerHTML = html;

            } catch (error) {
                resultsEl.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
            }
        }

        window.addEventListener('load', loadKB);
        document.getElementById('query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
