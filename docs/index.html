<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="docs/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumulo IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
            max-height: 860px;
            overflow: hidden;
        }

        .logo {
            width: 220px;
            height: 220px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 16px;
        }

        .api-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
            transition: margin 0.2s ease;
        }

        .api-row.collapsed {
            margin-bottom: 0;
        }

        .api-setup {
            flex: 1;
            background: #1a1f2a;
            padding: 14px;
            border-radius: 8px;
            border-left: 3px solid #f59e0b;
            transition: all 0.3s ease;
            text-align: left;
        }

        .api-setup.hidden {
            display: none;
        }

        .api-setup input {
            width: 100%;
            padding: 10px 12px;
            background: #0f1419;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
        }

        .api-setup input::placeholder {
            color: #7c8494;
        }

        .btn-auth {
            width: 42px;
            height: 42px;
            background: #0d7ee6;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-auth:hover {
            background: #0a6bc4;
        }

        .btn-auth svg {
            width: 18px;
            height: 18px;
        }

        .auth-loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #1a1f2a;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 3px solid #0d7ee6;
            color: #aaa;
            font-size: 14px;

        }

        .auth-loading.show {

        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #333;

            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .api-success {
            display: none;
            background: #1a2f1a;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 3px solid #10b981;

            font-size: 14px;
            font-weight: 500;

            justify-content: center;

            animation: fadeIn 0.4s ease-out;

        .api-success.show {
            display: flex;
        }

        .api-success svg {

            flex-shrink: 0;
        }

        .api-error {

            background: #2a1a1a;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 3px solid #ff6b6b;
            color: #ff6b6b;
            font-size: 14px;
            font-weight: 500;

            height: 18px;

        .msg-row.user {

        .msg-bubble {

            font-size: 14px;

        .msg-row.user .msg-bubble {

        .msg-row.assistant .msg-bubble {

        .msg-bubble p {

        .modo-live-status .msg-bubble {

            color: #e8e8e8;

        #query {

        #searchBtn, .btn-live {

            height: 44px;
            background: #161b26;
            border: 1px solid #2f3646;
            border-radius: 10px;
            color: #c6cede;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #searchBtn:hover {
            background: #1f2938;
            color: #3b9eff;
            border-color: #3b9eff;
        }

        #searchBtn:disabled {
            opacity: 0.3;

        }

        #searchBtn svg {

        .btn-live:hover {
            background: #1f2938;

        }

        .btn-live:disabled {

        .btn-live.active {

        .btn-live.active:hover {

        .btn-live svg {

        }

        .live-rec-dot {

        .loading-box {

            font-size: 14px;

        .loading-box.show {

        .no-results {

    </style>

<body>
    <div class="container">
        <div class="logo">
            <img src="icon.png" alt="Cumulo" onerror="this.style.display='none'">
        </div>

        <div class="api-row" id="apiRow">
            <div class="api-setup" id="apiSetup">
                <input type="password" id="apiKey" placeholder="Bienvenido, por favor ingresa tu código de acceso para continuar..." onkeypress="if(event.key==='Enter') authenticate()">
            </div>
            <button class="btn-auth" id="btnAuth" onclick="authenticate()" aria-label="Autenticar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

        <div class="auth-loading" id="authLoading">
            <div class="spinner"></div>
            Realizando autenticacion...
        </div>

        <div class="api-success" id="apiSuccess">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            Autenticacion correcta
        </div>

        <div class="api-error" id="apiError">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
            Acceso denegado
        </div>

        <div class="search-box" id="searchBox">
            <input type="text" id="query" placeholder="Escribe tu pregunta aqui" disabled>
            <button id="searchBtn" onclick="handleSubmit()" aria-label="Buscar" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button class="btn-live" id="btnLive" onclick="toggleLive()" disabled aria-label="Live">
                <svg id="liveIconHeadset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                    <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
                </svg>
                <span id="liveIconActive" class="live-rec-dot" style="display:none;"></span>
            </button>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="loading-box" id="loadingBox">
            <div class="spinner"></div>
            Buscando...
        </div>
    </div>

    <script>
        // ===================================================================
        // CONFIGURACION Y ESTADO GLOBAL
        // ===================================================================
        let knowledgeBase = [];
        let isAuthenticated = false;
        let isLiveMode = false;
        let qaHistory = [];
        let isProcessing = false;
        let chatModeActive = false;

        // ─── Estado del modo Live (WebSocket a Gemini Live) ───
        let liveWs = null;
        let liveAudioContext = null;
        let liveMediaStream = null;
        let liveAudioWorklet = null;
        let liveOutputCtx = null;
        let liveNextStartTime = 0;
        let liveActiveSources = [];
        let liveAnswerId = null;
        let liveInputBuffer = '';
        let liveOutputBuffer = '';
        let liveListeningBubbleId = null;

        // KB en formato plano para busqueda rapida (se carga al inicio)
        let kbDocuments = [];

        const GEMINI_CHAT_MODEL = 'gemini-3.1-flash-lite';
        const GEMINI_LIVE_MODEL = 'gemini-3.1-flash-live-preview';
        const COLORS = ['#10b981', '#0d7ee6', '#f59e0b', '#8b5cf6', '#ec4899'];

        // ===================================================================
        // CARGA DE BASE DE CONOCIMIENTO
        // ===================================================================
        async function loadKB() {
            try {
                const res = await fetch('kb.json');
                kbDocuments = await res.json();
                // Aplanar chunks para busqueda
                knowledgeBase = kbDocuments.flatMap(doc =>
                    doc.chunks.map(chunk => ({
                        ...chunk,
                        _doc: doc
                    }))
                );
                console.log('Cargados ' + kbDocuments.length + ' documentos, ' + knowledgeBase.length + ' chunks');
            } catch (e) {
                console.error('Error cargando KB:', e);
            }
        }

        // ===================================================================
        // BUSQUEDA DE CHUNKS RELEVANTES
        // ===================================================================
        function findRelevantChunks(query) {
            const queryWords = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
            if (queryWords.length === 0) return [];

            return knowledgeBase
                .map(chunk => {
                    let score = 0;
                    const text = (chunk.text || '').toLowerCase();
                    const doc = chunk._doc;
                    const filename = (doc.file?.name || '').toLowerCase();
                    const section = (chunk.section || '').toLowerCase();
                    const docType = (doc.document_type || '').toLowerCase();
                    const committee = (doc.committee || '').toLowerCase();

                    queryWords.forEach(word => {
                        const matches = (text.match(new RegExp(word, 'g')) || []).length;
                        score += matches;
                        if (filename.includes(word)) score += 5;
                        if (section.includes(word)) score += 3;
                        if (docType.includes(word)) score += 4;
                        if (committee.includes(word)) score += 4;
                        if ((doc.keywords || []).some(kw => kw.toLowerCase().includes(word))) score += 2;
                    });

                    const dateStr = doc.dates?.start;
                    if (dateStr) {
                        const dateVal = new Date(dateStr).getTime();
                        if (!isNaN(dateVal)) {
                            const now = Date.now();
                            const daysDiff = (now - dateVal) / (1000 * 60 * 60 * 24);
                            if (daysDiff < 365) score += 3;
                            if (daysDiff < 90) score += 5;
                            if (daysDiff < 30) score += 8;
                        }
                    }

                    return { chunk, score };
                })
                .filter(x => x.score > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, 5)
                .map(x => x.chunk);
        }

        // ===================================================================
        // CONSTRUIR CONTEXTO PARA PROMPT
        // ===================================================================
        function buildContext(chunks) {
            if (!chunks || chunks.length === 0) return 'No se encontraron documentos relevantes.';
            return chunks.map(chunk => {
                const doc = chunk._doc;
                const parts = [];
                parts.push('📄 ' + doc.document_id + ' | ' + doc.document_type.toUpperCase() + ' | ' + doc.committee);
                parts.push('📅 Fecha: ' + (doc.dates?.start || 'sin fecha') + ' | Estado: ' + doc.status);
                if (doc.participants?.length > 0) {
                    parts.push('👥 Participantes: ' + doc.participants.map(p => p.name + ' (' + p.role + ')').join(', '));
                }
                parts.push('📝 Seccion: ' + (chunk.section || 'contenido general'));
                parts.push('');
                parts.push(chunk.text);
                return parts.join('\n');
            }).join('\n\n---DOCUMENTO SIGUIENTE---\n\n');
        }

        // ===================================================================
        // UTILIDADES
        // ===================================================================
        async function verifyApiKey(apiKey) {
            try {
                const testPrompt = 'Responde unicamente "OK".';
                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_CHAT_MODEL + ':generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: testPrompt }] }]
                        })
                    }
                );
                return response.ok;
            } catch (e) {
                return false;
            }
        }

        function formatMarkdown(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
                .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
                .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
                .replace(/^-\s+(.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.+<\/li>\n?)+/g, '<ul>$&</ul>')
                .replace(/\n/g, '<br>');
        }

        function truncateToWords(text, maxWords) {
            const words = text.trim().split(/\s+/);
            if (words.length <= maxWords) return text;
            return words.slice(0, maxWords).join(' ') + '...';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===================================================================
        // CONTEXTO DE CONVERSACION (para resolver preguntas de seguimiento)
        // ===================================================================
        function getRecentHistory(maxTurns) {
            return qaHistory.slice(-maxTurns).filter(h => h.question && h.answer);
        }

        function buildHistoryBlock(maxTurns) {
            const recent = getRecentHistory(maxTurns || 3);
            if (recent.length === 0) return '';
            const lines = recent.map(h => 'Usuario: ' + h.question + '\nAsistente: ' + h.answer).join('\n\n');
            return '\n\nHISTORIAL RECIENTE DE LA CONVERSACION (usalo unicamente para entender referencias como "eso", "cuando se creo", "quien lo propuso", etc. No repitas esta informacion, solo interpretala):\n' + lines + '\n';
        }

        // Amplia la busqueda de chunks con la ultima pregunta, para que las
        // preguntas de seguimiento sin palabras clave propias (ej. "¿cuando se creo?")
        // sigan recuperando los documentos correctos.
        function buildRetrievalQuery(query) {
            const recent = getRecentHistory(1);
            if (recent.length === 0) return query;
            return (recent[0].question + ' ' + query).trim();
        }

        // ===================================================================
        // DETECCION DE SOLICITUD DE GENERACION DE DOCUMENTOS
        // ===================================================================
        function detectDocumentRequest(query) {
            const q = query.toLowerCase();
            const actionWords = /(genera|generame|redacta|redactame|escribe|escribeme|crea|creame|elabora|elaborame|hazme|haz|prepara|preparame)/;
            const docWords = /(carta|certificado|constancia|oficio|memorando|comunicado|documento|informe|acta|solicitud)/;
            return actionWords.test(q) && docWords.test(q);
        }

        // Genera un archivo .doc (compatible con Word) descargable a partir de HTML
        function generateDocDownload(title, htmlBodyContent) {
            const htmlDoc = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">' +
                '<head><meta charset="utf-8"><title>' + escapeHtml(title) + '</title>' +
                '<style>body{font-family:Calibri,Arial,sans-serif;font-size:12pt;line-height:1.6;color:#000;} h1,h2,h3{color:#000;}</style>' +
                '</head><body>' + htmlBodyContent + '</body></html>';
            const blob = new Blob(['\ufeff' + htmlDoc], { type: 'application/msword' });
            return URL.createObjectURL(blob);
        }

        function slugifyFilename(text) {
            return (text || 'documento')
                .toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/(^-|-$)/g, '')
                .slice(0, 40) || 'documento';
        }

        function renderDetailPanel(chunks, panelId) {
            // Agrupar por documento para no repetir la misma fuente varias veces
            const seen = new Set();
            const docs = [];
            chunks.forEach(chunk => {
                const doc = chunk._doc;
                const key = doc.document_id || ((doc.file?.name || '') + '|' + (doc.dates?.start || ''));
                if (!seen.has(key)) {
                    seen.add(key);
                    docs.push(doc);
                }
            });

            let html = '<div class="detail-panel" id="' + panelId + '">';
            html += '<h4>Fuentes</h4>';
            html += '<ul class="source-list">';

            docs.forEach((doc, i) => {
                const color = COLORS[i % COLORS.length];
                const fileName = doc.file?.name || 'Documento sin nombre';
                const folder = doc.file?.folder || doc.folder || doc.committee || 'Sin carpeta';
                const date = doc.dates?.start || 'Sin fecha';
                html += '<li class="source-item" style="border-left-color:' + color + '">' +
                    '<span class="source-file">' + escapeHtml(fileName) + '</span>' +
                    '<span class="source-folder">' + escapeHtml(folder) + '</span>' +
                    '<span class="source-date">' + escapeHtml(date) + '</span>' +
                    '</li>';
            });

            html += '</ul></div>';
            return html;
        }

        async function search() {
            const query = document.getElementById('query').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();

            if (!isAuthenticated) {
                addMessageToChat('', 'Acceso denegado. Este documento contiene informacion confidencial. Solicita el codigo e intenta nuevamente.', false, []);
                return;
            }

            if (isAuthenticated && !query) {
                addMessageToChat('', 'Este buscador te permite consultar informacion sobre decisiones, actas y procesos del grupo de astronomia Cumulo. Puedes preguntar sobre reuniones, acuerdos, eventos, proyectos y cualquier documento relevante de la organizacion.', false, []);
                return;
            }

            if (isProcessing) return;
            isProcessing = true;
            setInputsDisabled(true);

            document.getElementById('loadingBox').classList.add('show');

            try {
                const retrievalQuery = buildRetrievalQuery(query);
                const relevantChunks = findRelevantChunks(retrievalQuery);

                if (relevantChunks.length === 0) {
                    document.getElementById('loadingBox').classList.remove('show');
                    addMessageToChat(query, 'No encontre documentos relevantes. Intenta con otras palabras clave.', false, []);
                    isProcessing = false;
                    setInputsDisabled(false);
                    document.getElementById('query').value = '';
                    document.getElementById('query').focus();
                    return;
                }

                const context = buildContext(relevantChunks);
                const historyBlock = buildHistoryBlock(3);
                const wantsDocument = detectDocumentRequest(query);

                const prompt = wantsDocument
                    ? 'Eres un asistente experto en los procesos, decisiones y documentos del grupo de astronomia Cumulo. Con base en los documentos proporcionados, redacta el documento que pide el usuario de forma completa, formal y bien estructurada (encabezado, cuerpo, cierre y firma si corresponde). Usa fechas, nombres, cargos y decisiones reales de los documentos cuando sean relevantes; si falta un dato especifico, deja un marcador claro como "[completar]" en vez de inventarlo.\n\nDOCUMENTOS RELEVANTES:\n' + context + historyBlock + '\n\nSOLICITUD DEL USUARIO: ' + query + '\n\nEntrega unicamente el texto completo del documento, listo para usar.'
                    : 'Eres un asistente experto en los procesos, decisiones y documentos del grupo de astronomia Cumulo. Responde de forma breve (menos de 50 palabras) con base en los documentos proporcionados. Prioriza la informacion mas reciente si hay datos repetidos.\n\nDOCUMENTOS RELEVANTES:\n' + context + historyBlock + '\n\nPREGUNTA DEL USUARIO: ' + query + '\n\nINSTRUCCIONES:\n1. Basa tu respuesta en la informacion de los documentos proporcionados\n2. Si la pregunta hace referencia a algo mencionado antes en la conversacion (ej. "eso", "cuando se creo", "quien lo propuso"), usa el HISTORIAL para saber a que se refiere\n3. Si la pregunta pide un analisis, opinion o inferencia que no esta escrita explicitamente (ej. que podria faltar, riesgos, recomendaciones), razona brevemente a partir de la informacion disponible y aclara que es un analisis\n4. Si la pregunta busca un dato factual puntual que simplemente no aparece en los documentos ni se puede inferir, di "No encontre informacion sobre esto en los documentos"\n5. Prioriza la informacion mas reciente si hay datos repetidos';

                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_CHAT_MODEL + ':generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    }
                );

                const data = await response.json();

                if (!response.ok) {
                    throw new Error((data.error && data.error.message) || 'Error');
                }

                let answer = (data.candidates && data.candidates[0] &&
                    data.candidates[0].content.parts[0].text) || 'No pude generar respuesta';

                let downloadUrl = null;
                let downloadName = null;

                if (wantsDocument) {
                    downloadUrl = generateDocDownload(query, formatMarkdown(answer));
                    downloadName = slugifyFilename(query) + '.doc';
                } else {
                    answer = truncateToWords(answer, 50);
                }

                document.getElementById('loadingBox').classList.remove('show');
                addMessageToChat(query, answer, false, relevantChunks, downloadUrl, downloadName);

            } catch (error) {
                document.getElementById('loadingBox').classList.remove('show');
                addMessageToChat(query, 'Error: ' + error.message, false, []);
            }

            isProcessing = false;
            setInputsDisabled(false);
            document.getElementById('query').value = '';
            document.getElementById('query').focus();
        }

        async function startLiveMode() {

            updateLiveButtonUI(true);
            liveInputBuffer = '';
            liveOutputBuffer = '';
            liveAnswerId = null;

            addSystemMessage('Modo Live activo — Puedes hablar', true);

            // Conectar WebSocket a Gemini Live
            const wsUrl = 'wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=' + apiKey;

            try {
                liveWs = new WebSocket(wsUrl);

                liveWs.onopen = () => {
                    console.log('Live WebSocket connected');
                    liveWs.send(JSON.stringify({
                        setup: {
                            model: 'models/' + GEMINI_LIVE_MODEL,
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: {
                                            voiceName: "Puck"
                                        }
                                    }
                                }
                            },
                            systemInstruction: {
                                parts: [{ text: buildLiveSystemInstruction() }]
                            },
                            inputAudioTranscription: {},
                            outputAudioTranscription: {}
                        }
                    }));
                };

                liveWs.onmessage = async (event) => {
    let response;
    if (event.data instanceof Blob) {
        const text = await event.data.text();
        response = JSON.parse(text);
    } else {
        response = JSON.parse(event.data);
    }
                    console.log('Live response:', response);

                    if (response.setupComplete) {
                        console.log('Live setup complete');
                        startMicrophoneCapture();
                        showListeningBubble();
                    }

                    if (response.serverContent) {
                        const sc = response.serverContent;
                        const chatArea = document.getElementById('chatArea');

                        // Interrupcion
                        if (sc.interrupted) {
                            stopAllLiveAudio();
                        }

                        // Transcripcion de entrada (usuario hablando)
                        if (sc.inputTranscription && typeof sc.inputTranscription.text === 'string') {
                            liveInputBuffer += sc.inputTranscription.text;
                        }

                        // Transcripcion de salida (modelo respondiendo)
                        if (sc.outputTranscription && typeof sc.outputTranscription.text === 'string') {
                            if (!liveAnswerId) {
                                removeListeningBubble();
                                liveAnswerId = 'live-' + Date.now();
                                const qText = liveInputBuffer.trim() || '(entrada de voz)';
                                const qHtml = '<div class="msg-row user" id="' + liveAnswerId + '-q"><div class="msg-bubble">' + escapeHtml(qText) + '</div></div>';
                                const aHtml = '<div class="msg-row assistant" id="' + liveAnswerId + '-a"><div class="msg-bubble"><span class="live-answer-text"></span></div></div>';
                                chatArea.insertAdjacentHTML('beforeend', qHtml + aHtml);
                                liveOutputBuffer = '';
                            }
                            liveOutputBuffer += sc.outputTranscription.text;
                            const ansTextEl = document.querySelector('#' + liveAnswerId + '-a .live-answer-text');
                            if (ansTextEl) ansTextEl.innerHTML = formatMarkdown(liveOutputBuffer);
                            chatArea.scrollTop = chatArea.scrollHeight;
                        }

                        // Turno completo
                        if (sc.turnComplete) {
                            if (liveAnswerId) {
                                qaHistory.push({
                                    id: liveAnswerId,
                                    question: liveInputBuffer.trim(),
                                    answer: liveOutputBuffer.trim(),
                                    chunks: [],
                                    isLive: true,
                                    timestamp: new Date()
                                });
                            }
                            liveAnswerId = null;
                            liveInputBuffer = '';
                            liveOutputBuffer = '';
                            if (isLiveMode) showListeningBubble();
                        }

                        // Audio de salida
                        if (sc.modelTurn && sc.modelTurn.parts) {
                            for (const part of sc.modelTurn.parts) {
                                if (part.inlineData && part.inlineData.data) {
                                    playAudioChunk(part.inlineData.data);
                                }
                            }
                        }
                    }
                };

                liveWs.onerror = (error) => {
                    console.error('Live WebSocket error:', error);
                    addSystemMessage('Error de conexion en modo Live');
                    stopLiveMode();
                };

                liveWs.onclose = () => {
                    console.log('Live WebSocket closed');
                    if (isLiveMode) stopLiveMode();
                };

            } catch (e) {
                console.error('Error starting live mode:', e);
                stopLiveMode();
            }
        }

            if (liveAudioContext) {

            }

        async function startMicrophoneCapture() {
    try {
        console.log('[LIVE] Solicitando micrófono...');
        
        liveMediaStream = await navigator.mediaDevices.getUserMedia({ 
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true,
                sampleRate: 16000
            } 
        });
        console.log('[LIVE] Micrófono obtenido');

        liveAudioContext = new AudioContext({ sampleRate: 16000 });
        
        // En móvil, el AudioContext empieza suspendido
        if (liveAudioContext.state === 'suspended') {
            await liveAudioContext.resume();
            console.log('[LIVE] AudioContext resumido');
        }

        const source = liveAudioContext.createMediaStreamSource(liveMediaStream);

        // Intentar usar AudioWorklet (moderno), fallback a ScriptProcessor
        if (liveAudioContext.audioWorklet) {
            console.log('[LIVE] Usando AudioWorklet');
            
            // Crear el worklet inline como blob
            const workletCode = `
                class PCMEncoder extends AudioWorkletProcessor {
                    process(inputs, outputs, parameters) {
                        const input = inputs[0];
                        if (input.length > 0) {
                            const channelData = input[0];
                            const int16Data = new Int16Array(channelData.length);
                            for (let i = 0; i < channelData.length; i++) {
                                int16Data[i] = Math.max(-1, Math.min(1, channelData[i])) * 0x7FFF;
                            }
                            this.port.postMessage(int16Data.buffer, [int16Data.buffer]);
                        }
                        return true;
                    }
                }
                registerProcessor('pcm-encoder', PCMEncoder);
            `;
            
            const blob = new Blob([workletCode], { type: 'application/javascript' });
            const workletUrl = URL.createObjectURL(blob);
            
            await liveAudioContext.audioWorklet.addModule(workletUrl);
            
            const workletNode = new AudioWorkletNode(liveAudioContext, 'pcm-encoder');
            workletNode.port.onmessage = (e) => {
                if (!isLiveMode || !liveWs || liveWs.readyState !== WebSocket.OPEN) return;
                
                const base64 = arrayBufferToBase64(e.data);
                liveWs.send(JSON.stringify({
                    realtimeInput: {
                        audio: {
                            data: base64,
                            mimeType: 'audio/pcm;rate=16000'
                        }
                    }
                }));
            };
            
            source.connect(workletNode);
            liveAudioWorklet = workletNode;
            
        } else {
            // Fallback a ScriptProcessorNode (deprecated pero funcional)
            console.log('[LIVE] Fallback a ScriptProcessorNode');
            
            const bufferSize = 4096;
            const processor = liveAudioContext.createScriptProcessor(bufferSize, 1, 1);

            processor.onaudioprocess = (e) => {
                if (!isLiveMode || !liveWs || liveWs.readyState !== WebSocket.OPEN) return;

                const inputData = e.inputBuffer.getChannelData(0);
                const pcmData = new Int16Array(inputData.length);
                for (let i = 0; i < inputData.length; i++) {
                    pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                }

                const base64 = arrayBufferToBase64(pcmData.buffer);
                liveWs.send(JSON.stringify({
                    realtimeInput: {
                        audio: {
                            data: base64,
                            mimeType: 'audio/pcm;rate=16000'
                        }
                    }
                }));
            };

            source.connect(processor);
            processor.connect(liveAudioContext.destination);
            liveAudioWorklet = processor;
        }

        console.log('[LIVE] Captura de audio iniciada');

    } catch (e) {
        console.error('[LIVE] Error accediendo al micrófono:', e);
        addSystemMessage('No se pudo acceder al micrófono: ' + e.message);
        stopLiveMode();
    }
}

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        function ensureOutputContext() {
            if (!liveOutputCtx) {
                liveOutputCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                liveNextStartTime = liveOutputCtx.currentTime;
            }
            return liveOutputCtx;
        }

        function playAudioChunk(base64Data) {
            try {
                const ctx = ensureOutputContext();
                const binaryStr = atob(base64Data);
                const len = binaryStr.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) bytes[i] = binaryStr.charCodeAt(i);

                const view = new DataView(bytes.buffer);
                const sampleCount = Math.floor(len / 2);
                if (sampleCount === 0) return;

                const audioBuffer = ctx.createBuffer(1, sampleCount, 24000);
                const channelData = audioBuffer.getChannelData(0);
                for (let i = 0; i < sampleCount; i++) {
                    channelData[i] = view.getInt16(i * 2, true) / 32768;
                }

                const source = ctx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(ctx.destination);

                const now = ctx.currentTime;
                if (liveNextStartTime < now) liveNextStartTime = now;
                source.start(liveNextStartTime);
                liveNextStartTime += audioBuffer.duration;

                liveActiveSources.push(source);
                source.onended = () => {
                    const idx = liveActiveSources.indexOf(source);
                    if (idx !== -1) liveActiveSources.splice(idx, 1);
                };
            } catch (e) {
                console.error('Error reproduciendo audio:', e);
            }
        }

        function stopAllLiveAudio() {
            liveActiveSources.forEach(s => {
                try { s.stop(); } catch (e) { /* ya pudo haber terminado */ }
            });
            liveActiveSources = [];
            if (liveOutputCtx) liveNextStartTime = liveOutputCtx.currentTime;
        }

        async function sendLiveText(text) {
            if (!liveWs || liveWs.readyState !== WebSocket.OPEN) return;
            removeListeningBubble();
            liveInputBuffer = text;
            liveWs.send(JSON.stringify({
                realtimeInput: {
                    text: text
                }
            }));
        }

        // ===================================================================
        // INICIALIZACION
        // ===================================================================
        window.addEventListener('load', loadKB);
        document.getElementById('query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSubmit();
            }
        });

// ===================================================================
// PANTALLA COMPLETA EN DISPOSITIVOS TACTILES
// ===================================================================
// Se activa al oprimir el boton de enviar el codigo de acceso (authenticate()),
// que es el propio gesto del usuario requerido por el navegador para permitir pantalla completa.
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function requestFullscreenOnTouch() {
    if (!isTouchDevice) return;
    if (document.fullscreenElement || document.webkitFullscreenElement) return;

    const elem = document.documentElement;
    if (elem.requestFullscreen) {
        elem.requestFullscreen().catch(() => {});
    } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
    }
}
    </script>
</body>
