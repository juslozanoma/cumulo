<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumulo IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 560px;
            text-align: center;
        }

        .logo {
            width: 220px;
            height: 220px;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 16px;
        }

        .api-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 20px;
        }

        .api-setup {
            flex: 1;
            background: #1a1f2a;
            padding: 16px;
            border-radius: 8px;
            border-left: 3px solid #f59e0b;
            transition: all 0.3s ease;
            text-align: left;
        }

        .api-setup.hidden {
            display: none;
        }

        .api-setup input {
            width: 100%;
            padding: 10px 12px;
            background: #0f1419;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
        }

        .api-setup input::placeholder {
            color: #666;
        }

        .btn-auth {
            width: 42px;
            height: 42px;
            background: #0d7ee6;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-auth:hover {
            background: #0a6bc4;
        }

        .btn-auth svg {
            width: 18px;
            height: 18px;
        }

        .auth-loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #1a1f2a;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 3px solid #0d7ee6;
            color: #aaa;
            font-size: 14px;
        }

        .auth-loading.show {
            display: flex;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #333;
            border-top-color: #0d7ee6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .api-success {
            display: none;
            background: #1a2f1a;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 3px solid #10b981;
            color: #10b981;
            font-size: 14px;
            font-weight: 500;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
        }

        .api-success.show {
            display: flex;
        }

        .api-success svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .api-error {
            display: none;
            background: #2a1a1a;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 3px solid #ff6b6b;
            color: #ff6b6b;
            font-size: 14px;
            font-weight: 500;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
        }

        .api-error.show {
            display: flex;
        }

        .api-error svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-box {
            position: relative;
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #query {
            flex: 1;
            padding: 14px 16px;
            background: #14181f;
            border: 1px solid #2a2f3a;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        #query:focus {
            outline: none;
            border-color: #0d7ee6;
        }

        #query::placeholder {
            color: #666;
        }

        #query:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #searchBtn {
            width: 42px;
            height: 42px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #searchBtn:hover {
            background: #1f2530;
            color: #0d7ee6;
        }

        #searchBtn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #searchBtn svg {
            width: 18px;
            height: 18px;
        }

        .btn-live {
            padding: 10px 16px;
            background: #1a2f1a;
            border: 1px solid #10b981;
            border-radius: 8px;
            color: #10b981;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-live:hover {
            background: #10b981;
            color: #0a0e17;
        }

        .btn-live:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-live.active {
            background: #ff6b6b;
            border-color: #ff6b6b;
            color: #fff;
        }

        .btn-live.active:hover {
            background: #e55a5a;
        }

        .btn-live .live-dot {
            width: 8px;
            height: 8px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .results {
            display: none;
            margin-top: 30px;
            text-align: left;
        }

        .results.show {
            display: block;
        }

        .qa-block {
            margin-bottom: 16px;
            animation: slideIn 0.3s ease-out;
        }

        .qa-question {
            background: #1a1f2a;
            padding: 12px 16px;
            border-radius: 8px 8px 0 0;
            border-left: 3px solid #0d7ee6;
            color: #aaa;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qa-question svg {
            width: 14px;
            height: 14px;
            color: #0d7ee6;
            flex-shrink: 0;
        }

        .qa-answer {
            background: #1e2330;
            padding: 16px;
            border-radius: 0 0 8px 8px;
            border-left: 3px solid #10b981;
            color: #e8e8e8;
            line-height: 1.7;
            font-size: 15px;
        }

        .qa-answer.live-mode {
            border-left-color: #ff6b6b;
        }

        .qa-answer strong {
            color: #fff;
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .qa-answer p {
            color: #ccc;
            line-height: 1.7;
            margin-bottom: 6px;
        }

        .qa-answer h1, .qa-answer h2, .qa-answer h3 {
            color: #fff;
            margin: 12px 0 8px 0;
            font-size: 16px;
        }

        .qa-answer ul, .qa-answer ol {
            margin: 8px 0 8px 20px;
            color: #ccc;
        }

        .qa-answer li {
            margin-bottom: 4px;
        }

        .qa-answer b, .qa-answer strong.inline {
            color: #fff;
            font-weight: 600;
        }

        .btn-more {
            display: inline-block;
            margin-top: 14px;
            padding: 8px 18px;
            background: #2a2f3a;
            color: #0d7ee6;
            border: 1px solid #2a2f3a;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-more:hover {
            background: #1f2530;
            border-color: #0d7ee6;
        }

        .detail-box {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #333;
        }

        .detail-box.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .detail-box h4 {
            color: #888;
            font-size: 12px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-chunk {
            background: #161b26;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid;
            font-size: 12px;
            color: #999;
            line-height: 1.6;
        }

        .detail-chunk .chunk-header {
            color: #777;
            font-size: 11px;
            margin-bottom: 6px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .detail-chunk .chunk-text {
            color: #bbb;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-box {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 30px;
            color: #888;
            font-size: 15px;
        }

        .loading-box.show {
            display: flex;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #888;
        }

        .no-results strong {
            display: block;
            font-size: 17px;
            margin-bottom: 6px;
            color: #ccc;
        }

        .live-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            background: #2a1a1a;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 3px solid #ff6b6b;
            color: #ff6b6b;
            font-size: 13px;
        }

        .live-indicator.show {
            display: flex;
        }

        .live-indicator .live-dot {
            width: 8px;
            height: 8px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="icon.png" alt="Cumulo" onerror="this.style.display='none'">
        </div>

        <div class="api-row" id="apiRow">
            <div class="api-setup" id="apiSetup">
                <input type="password" id="apiKey" placeholder="Bienvenido, por favor ingresa tu código de acceso para continuar..." onkeypress="if(event.key==='Enter') authenticate()">
            </div>
            <button class="btn-auth" id="btnAuth" onclick="authenticate()" aria-label="Autenticar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

        <div class="auth-loading" id="authLoading">
            <div class="spinner"></div>
            Realizando autenticación...
        </div>

        <div class="api-success" id="apiSuccess">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            Autenticación correcta
        </div>

        <div class="api-error" id="apiError">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
            Acceso denegado
        </div>

        <div class="live-indicator" id="liveIndicator">
            <div class="live-dot"></div>
            Modo Live activo — habla o escribe para consultar
        </div>

        <div class="search-box">
            <input type="text" id="query" placeholder="Pregunta sobre decisiones, actas o procesos de Cumulo" disabled>
            <button id="searchBtn" onclick="search()" aria-label="Buscar" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button class="btn-live" id="btnLive" onclick="toggleLive()" disabled>
                <div class="live-dot"></div>
                Live
            </button>
        </div>

        <div id="results" class="results"></div>
    </div>

    <script>
        let knowledgeBase = [];
        let isAuthenticated = false;
        let isLiveMode = false;
        let qaHistory = [];
        let liveRecognition = null;
        let isProcessing = false;

        async function loadKB() {
            try {
                const res = await fetch('kb.json');
                knowledgeBase = await res.json();
                console.log('Cargados ' + knowledgeBase.length + ' chunks');
            } catch (e) {
                console.error('Error cargando KB:', e);
            }
        }

        function findRelevantChunks(query) {
            const queryWords = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);

            return knowledgeBase
                .map(chunk => {
                    let score = 0;
                    const text = chunk.text.toLowerCase();
                    const filename = chunk.filename.toLowerCase();

                    queryWords.forEach(word => {
                        const matches = (text.match(new RegExp(word, 'g')) || []).length;
                        score += matches;
                        if (filename.includes(word)) score += 5;
                    });

                    if (chunk.date) {
                        const dateVal = new Date(chunk.date).getTime();
                        if (!isNaN(dateVal)) {
                            const now = Date.now();
                            const daysDiff = (now - dateVal) / (1000 * 60 * 60 * 24);
                            if (daysDiff < 365) score += 3;
                            if (daysDiff < 90) score += 5;
                            if (daysDiff < 30) score += 8;
                        }
                    }

                    return { chunk, score };
                })
                .filter(x => x.score > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, 5)
                .map(x => x.chunk);
        }

        async function verifyApiKey(apiKey) {
            try {
                const testPrompt = 'Responde únicamente "OK".';
                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: testPrompt }] }]
                        })
                    }
                );
                return response.ok;
            } catch (e) {
                return false;
            }
        }

        function formatMarkdown(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong class="inline">$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
                .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
                .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
                .replace(/^-\s+(.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.+<\/li>\n?)+/g, '<ul>$&</ul>')
                .replace(/\n/g, '<br>');
        }

        function truncateToWords(text, maxWords) {
            const words = text.trim().split(/\s+/);
            if (words.length <= maxWords) return text;
            return words.slice(0, maxWords).join(' ') + '...';
        }

        function toggleDetails(btnId, boxId) {
            const box = document.getElementById(boxId);
            const btn = document.getElementById(btnId);
            if (box.classList.contains('show')) {
                box.classList.remove('show');
                btn.textContent = 'Más información';
            } else {
                box.classList.add('show');
                btn.textContent = 'Menos información';
            }
        }

        function setInputsDisabled(disabled) {
            document.getElementById('query').disabled = disabled;
            document.getElementById('searchBtn').disabled = disabled;
            document.getElementById('btnLive').disabled = disabled;
            document.getElementById('apiKey').disabled = disabled;
            document.getElementById('btnAuth').disabled = disabled;
        }

        async function authenticate() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const authLoading = document.getElementById('authLoading');
            const apiSuccess = document.getElementById('apiSuccess');
            const apiError = document.getElementById('apiError');
            const apiSetup = document.getElementById('apiSetup');
            const apiRow = document.getElementById('apiRow');

            if (!apiKey) {
                apiError.classList.add('show');
                apiSuccess.classList.remove('show');
                return;
            }

            authLoading.classList.add('show');
            apiSuccess.classList.remove('show');
            apiError.classList.remove('show');
            setInputsDisabled(true);

            const valid = await verifyApiKey(apiKey);

            authLoading.classList.remove('show');

            if (valid) {
                isAuthenticated = true;
                apiSetup.classList.add('hidden');
                document.getElementById('btnAuth').style.display = 'none';
                apiRow.style.justifyContent = 'center';
                apiSuccess.classList.add('show');
                apiError.classList.remove('show');
                setInputsDisabled(false);
            } else {
                apiError.classList.add('show');
                apiSuccess.classList.remove('show');
                setInputsDisabled(false);
                document.getElementById('apiKey').focus();
            }
        }

        async function search() {
            const query = document.getElementById('query').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const resultsEl = document.getElementById('results');

            if (!isAuthenticated) {
                resultsEl.innerHTML = '<div class="qa-block"><div class="qa-answer"><strong>Acceso denegado</strong><p>Este documento contiene información confidencial. Solicita el código e intenta nuevamente.</p></div></div>';
                resultsEl.classList.add('show');
                return;
            }

            if (isAuthenticated && !query) {
                resultsEl.innerHTML = '<div class="qa-block"><div class="qa-answer"><strong>¿Qué puedo investigar en este buscador?</strong><p>Este buscador te permite consultar información sobre <strong>decisiones, actas y procesos del grupo de astronomía Cúmulo</strong>. Puedes preguntar sobre reuniones, acuerdos, eventos, proyectos y cualquier documento relevante de la organización.</p></div></div>';
                resultsEl.classList.add('show');
                return;
            }

            if (isProcessing) return;
            isProcessing = true;
            setInputsDisabled(true);

            const loadingId = 'loading-' + Date.now();
            const loadingHtml = '<div class="loading-box show" id="' + loadingId + '"><div class="spinner"></div>Buscando...</div>';
            resultsEl.classList.add('show');
            resultsEl.insertAdjacentHTML('beforeend', loadingHtml);

            try {
                const relevantChunks = findRelevantChunks(query);

                if (relevantChunks.length === 0) {
                    document.getElementById(loadingId).remove();
                    const noResult = '<div class="qa-block"><div class="qa-answer"><strong>No encontré documentos relevantes</strong><p>Intenta con otras palabras clave.</p></div></div>';
                    resultsEl.insertAdjacentHTML('beforeend', noResult);
                    isProcessing = false;
                    setInputsDisabled(false);
                    return;
                }

                const context = relevantChunks
                    .map(c => '[' + c.folder + ' - ' + c.date + ']\n' + c.text)
                    .join('\n\n---DOCUMENTO SIGUIENTE---\n\n');

                const prompt = 'Eres un asistente experto en los procesos, decisiones y documentos del grupo de astronomia Cumulo. Analiza los documentos proporcionados y responde de forma breve (menos de 50 palabras) como un análisis conciso basado en la información. Prioriza la información más reciente si hay datos repetidos.\n\nDOCUMENTOS RELEVANTES:\n' + context + '\n\nPREGUNTA DEL USUARIO: ' + query + '\n\nINSTRUCCIONES:\n1. Responde con un análisis breve (menos de 50 palabras) basado ÚNICAMENTE en los documentos\n2. Prioriza la información más reciente\n3. Si la información no está, di "No encontré información"';

                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    }
                );

                const data = await response.json();

                if (!response.ok) {
                    throw new Error((data.error && data.error.message) || 'Error');
                }

                let answer = (data.candidates && data.candidates[0] &&
                    data.candidates[0].content.parts[0].text) || 'No pude generar respuesta';

                answer = truncateToWords(answer, 50);

                const answerHtml = formatMarkdown(answer);
                const qaId = 'qa-' + Date.now();
                const btnId = 'btn-more-' + qaId;
                const boxId = 'detail-box-' + qaId;

                const colors = ['#10b981', '#0d7ee6', '#f59e0b', '#8b5cf6', '#ec4899'];

                let detailHtml = '<div class="detail-box" id="' + boxId + '">';
                detailHtml += '<h4>Fragmentos encontrados</h4>';

                relevantChunks.forEach((chunk, i) => {
                    const color = colors[i % colors.length];
                    const truncatedText = truncateToWords(chunk.text, 50);
                    detailHtml += '<div class="detail-chunk" style="border-left-color:' + color + '">' +
                        '<div class="chunk-header"><span>' + chunk.filename + '</span><span>' + chunk.folder + '</span><span>' + chunk.date + '</span></div>' +
                        '<div class="chunk-text">' + truncatedText.replace(/\n/g, '<br>') + '</div>' +
                        '</div>';
                });

                detailHtml += '</div>';

                const qaHtml = '<div class="qa-block" id="' + qaId + '">' +
                    '<div class="qa-question"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>' + escapeHtml(query) + '</div>' +
                    '<div class="qa-answer"><strong>Respuesta</strong><p>' + answerHtml + '</p>' +
                    '<button class="btn-more" id="' + btnId + '" onclick="toggleDetails(\'' + btnId + '\', \'' + boxId + '\')">Más información</button>' +
                    detailHtml +
                    '</div></div>';

                document.getElementById(loadingId).remove();
                resultsEl.insertAdjacentHTML('beforeend', qaHtml);

                qaHistory.push({ id: qaId, question: query, answer: answer, chunks: relevantChunks, isLive: false });

            } catch (error) {
                document.getElementById(loadingId).remove();
                const errHtml = '<div class="qa-block"><div class="qa-answer"><strong>Error</strong><p>' + escapeHtml(error.message) + '</p></div></div>';
                resultsEl.insertAdjacentHTML('beforeend', errHtml);
            }

            isProcessing = false;
            setInputsDisabled(false);
            document.getElementById('query').value = '';
            document.getElementById('query').focus();
        }

        async function toggleLive() {
            const btnLive = document.getElementById('btnLive');
            const liveIndicator = document.getElementById('liveIndicator');
            const queryInput = document.getElementById('query');

            if (!isAuthenticated) return;

            if (isLiveMode) {
                // Desactivar live
                isLiveMode = false;
                btnLive.classList.remove('active');
                btnLive.innerHTML = '<div class="live-dot"></div>Live';
                liveIndicator.classList.remove('show');
                if (liveRecognition) {
                    liveRecognition.stop();
                    liveRecognition = null;
                }
            } else {
                // Activar live
                isLiveMode = true;
                btnLive.classList.add('active');
                btnLive.innerHTML = '<div class="live-dot"></div>Detener';
                liveIndicator.classList.add('show');
                startLiveMode();
            }
        }

        async function startLiveMode() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const queryInput = document.getElementById('query');

            // Usar Web Speech API si está disponible
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                liveRecognition = new SpeechRecognition();
                liveRecognition.lang = 'es-ES';
                liveRecognition.continuous = true;
                liveRecognition.interimResults = false;

                liveRecognition.onresult = async (event) => {
                    const transcript = event.results[event.results.length - 1][0].transcript.trim();
                    if (transcript && !isProcessing) {
                        queryInput.value = transcript;
                        await processLiveQuery(transcript, apiKey);
                    }
                };

                liveRecognition.onerror = (event) => {
                    console.error('Speech recognition error:', event.error);
                };

                liveRecognition.start();
            }

            // También permitir escritura en vivo
            queryInput.addEventListener('keypress', liveKeyHandler);
        }

        function liveKeyHandler(e) {
            if (e.key === 'Enter' && isLiveMode) {
                const query = document.getElementById('query').value.trim();
                const apiKey = document.getElementById('apiKey').value.trim();
                if (query && !isProcessing) {
                    processLiveQuery(query, apiKey);
                }
            }
        }

        async function processLiveQuery(query, apiKey) {
            const resultsEl = document.getElementById('results');

            if (isProcessing) return;
            isProcessing = true;
            setInputsDisabled(true);

            const loadingId = 'loading-' + Date.now();
            const loadingHtml = '<div class="loading-box show" id="' + loadingId + '"><div class="spinner"></div>Buscando...</div>';
            resultsEl.classList.add('show');
            resultsEl.insertAdjacentHTML('beforeend', loadingHtml);

            try {
                const relevantChunks = findRelevantChunks(query);

                if (relevantChunks.length === 0) {
                    document.getElementById(loadingId).remove();
                    const noResult = '<div class="qa-block"><div class="qa-answer live-mode"><strong>No encontré documentos relevantes</strong><p>Intenta con otras palabras clave.</p></div></div>';
                    resultsEl.insertAdjacentHTML('beforeend', noResult);
                    isProcessing = false;
                    setInputsDisabled(false);
                    return;
                }

                const context = relevantChunks
                    .map(c => '[' + c.folder + ' - ' + c.date + ']\n' + c.text)
                    .join('\n\n---DOCUMENTO SIGUIENTE---\n\n');

                const prompt = 'Eres un asistente experto en los procesos, decisiones y documentos del grupo de astronomia Cumulo. Analiza los documentos proporcionados y responde de forma breve (menos de 50 palabras) como un análisis conciso basado en la información. Prioriza la información más reciente si hay datos repetidos.\n\nDOCUMENTOS RELEVANTES:\n' + context + '\n\nPREGUNTA DEL USUARIO: ' + query + '\n\nINSTRUCCIONES:\n1. Responde con un análisis breve (menos de 50 palabras) basado ÚNICAMENTE en los documentos\n2. Prioriza la información más reciente\n3. Si la información no está, di "No encontré información"';

                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-live-preview:generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    }
                );

                const data = await response.json();

                if (!response.ok) {
                    throw new Error((data.error && data.error.message) || 'Error');
                }

                let answer = (data.candidates && data.candidates[0] &&
                    data.candidates[0].content.parts[0].text) || 'No pude generar respuesta';

                answer = truncateToWords(answer, 50);

                const answerHtml = formatMarkdown(answer);
                const qaId = 'qa-live-' + Date.now();
                const btnId = 'btn-more-' + qaId;
                const boxId = 'detail-box-' + qaId;

                const colors = ['#10b981', '#0d7ee6', '#f59e0b', '#8b5cf6', '#ec4899'];

                let detailHtml = '<div class="detail-box" id="' + boxId + '">';
                detailHtml += '<h4>Fragmentos encontrados</h4>';

                relevantChunks.forEach((chunk, i) => {
                    const color = colors[i % colors.length];
                    const truncatedText = truncateToWords(chunk.text, 50);
                    detailHtml += '<div class="detail-chunk" style="border-left-color:' + color + '">' +
                        '<div class="chunk-header"><span>' + chunk.filename + '</span><span>' + chunk.folder + '</span><span>' + chunk.date + '</span></div>' +
                        '<div class="chunk-text">' + truncatedText.replace(/\n/g, '<br>') + '</div>' +
                        '</div>';
                });

                detailHtml += '</div>';

                const qaHtml = '<div class="qa-block" id="' + qaId + '">' +
                    '<div class="qa-question"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg><span style="color:#ff6b6b;font-weight:500;">[Live]</span> ' + escapeHtml(query) + '</div>' +
                    '<div class="qa-answer live-mode"><strong>Respuesta</strong><p>' + answerHtml + '</p>' +
                    '<button class="btn-more" id="' + btnId + '" onclick="toggleDetails(\'' + btnId + '\', \'' + boxId + '\')">Más información</button>' +
                    detailHtml +
                    '</div></div>';

                document.getElementById(loadingId).remove();
                resultsEl.insertAdjacentHTML('beforeend', qaHtml);

                qaHistory.push({ id: qaId, question: query, answer: answer, chunks: relevantChunks, isLive: true });

            } catch (error) {
                document.getElementById(loadingId).remove();
                const errHtml = '<div class="qa-block"><div class="qa-answer live-mode"><strong>Error</strong><p>' + escapeHtml(error.message) + '</p></div></div>';
                resultsEl.insertAdjacentHTML('beforeend', errHtml);
            }

            isProcessing = false;
            setInputsDisabled(false);
            document.getElementById('query').value = '';
            document.getElementById('query').focus();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.addEventListener('load', loadKB);
        document.getElementById('query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isLiveMode) search();
        });
    </script>
</body>
</html>
