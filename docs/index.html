<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumulo IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 560px;
            text-align: center;
        }

        .logo {
            width: 160px;
            height: 160px;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 16px;
        }

        .api-setup {
            background: #1a1f2a;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 3px solid #f59e0b;
        }

        .api-setup label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #ccc;
        }

        .api-setup a {
            color: #0d7ee6;
            text-decoration: none;
        }

        .api-setup input {
            width: 100%;
            padding: 8px;
            background: #0f1419;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
            margin-top: 6px;
        }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        #query {
            width: 100%;
            padding: 16px 52px 16px 18px;
            background: #14181f;
            border: 1px solid #2a2f3a;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        #query:focus {
            outline: none;
            border-color: #0d7ee6;
        }

        #query::placeholder {
            color: #666;
        }

        #searchBtn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 38px;
            height: 38px;
            padding: 0;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        #searchBtn:hover {
            background: #1f2530;
            color: #0d7ee6;
        }

        #searchBtn svg {
            width: 18px;
            height: 18px;
        }

        .results {
            display: none;
            margin-top: 30px;
            text-align: left;
        }

        .results.show {
            display: block;
        }

        .result-item {
            background: #e8e8e8;
            padding: 18px;
            margin-bottom: 14px;
            border-radius: 8px;
            border-left: 4px solid #10b981;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item.source {
            border-left-color: #8b5cf6;
        }

        .result-item.answer {
            border-left-color: #10b981;
            font-size: 15px;
            line-height: 1.8;
        }

        .result-item strong {
            color: #111;
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .result-item p {
            color: #222;
            line-height: 1.6;
            margin-bottom: 6px;
        }

        .meta {
            font-size: 12px;
            color: #555;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ccc;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 15px;
        }

        .error {
            color: #ff6b6b;
            background: #2a1a1a;
            padding: 16px;
            border-radius: 6px;
            border-left: 4px solid #ff6b6b;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #888;
        }

        .no-results strong {
            display: block;
            font-size: 17px;
            margin-bottom: 6px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="icon.png" alt="Cumulo" onerror="this.style.display='none'">
        </div>

        <div class="api-setup">
            <label>🔑 API Key Gemini (<a href="https://makersuite.google.com/app/apikey" target="_blank">obtén una gratis aquí</a>):</label>
            <input type="password" id="apiKey" placeholder="AIzaSy...">
        </div>

        <div class="search-box">
            <input type="text" id="query" placeholder="Pregunta sobre decisiones, actas o procesos de Cumulo">
            <button id="searchBtn" onclick="search()" aria-label="Buscar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>

        <div id="results" class="results"></div>
    </div>

    <script>
        let knowledgeBase = [];

        async function loadKB() {
            try {
                const res = await fetch('kb.json');
                knowledgeBase = await res.json();
                console.log('Cargados ' + knowledgeBase.length + ' chunks');
            } catch (e) {
                console.error('Error cargando KB:', e);
                document.getElementById('results').classList.add('show');
                document.getElementById('results').innerHTML =
                    '<div class="error">Error cargando base de conocimiento.</div>';
            }
        }

        function findRelevantChunks(query) {
            const queryWords = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);

            return knowledgeBase
                .map(chunk => {
                    let score = 0;
                    const text = chunk.text.toLowerCase();
                    const filename = chunk.filename.toLowerCase();

                    queryWords.forEach(word => {
                        const matches = (text.match(new RegExp(word, 'g')) || []).length;
                        score += matches;
                        if (filename.includes(word)) score += 5;
                    });

                    return { chunk, score };
                })
                .filter(x => x.score > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, 5)
                .map(x => x.chunk);
        }

        async function search() {
            const query = document.getElementById('query').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();

            if (!query) {
                alert('Escribe una pregunta');
                return;
            }

            if (!apiKey) {
                alert('Ingresa tu API Key');
                return;
            }

            const resultsEl = document.getElementById('results');
            resultsEl.innerHTML = '<div class="loading">Buscando...</div>';
            resultsEl.classList.add('show');

            try {
                const relevantChunks = findRelevantChunks(query);

                if (relevantChunks.length === 0) {
                    resultsEl.innerHTML =
                        '<div class="no-results"><strong>No encontre documentos relevantes.</strong><p>Intenta con otras palabras clave.</p></div>';
                    return;
                }

                const context = relevantChunks
                    .map(c => '[' + c.folder + ' - ' + c.date + ']\n' + c.text)
                    .join('\n\n---DOCUMENTO SIGUIENTE---\n\n');

                const prompt = 'Eres un asistente experto en los procesos, decisiones y documentos del grupo de astronomia Cumulo.\n\nDOCUMENTOS RELEVANTES:\n' + context + '\n\nPREGUNTA DEL USUARIO: ' + query + '\n\nINSTRUCCIONES:\n1. Responde UNICAMENTE basandote en los documentos proporcionados\n2. Si la informacion no esta, di "No encontre informacion"\n3. Se preciso sobre fechas y decisiones';

                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    }
                );

                const data = await response.json();

                if (!response.ok) {
                    throw new Error((data.error && data.error.message) || 'Error');
                }

                const answer = (data.candidates && data.candidates[0] &&
                    data.candidates[0].content.parts[0].text) || 'No pude generar respuesta';

                let html = '<div class="result-item answer"><strong>Respuesta</strong><p>' +
                    answer.replace(/\n/g, '<br>') + '</p></div>';

                html += '<div style="margin:20px 0 12px;color:#888;font-size:12px;">Documentos usados:</div>';

                relevantChunks.forEach((chunk, i) => {
                    const preview = chunk.text.substring(0, 200) + (chunk.text.length > 200 ? '...' : '');
                    html += '<div class="result-item source">' +
                        '<strong>' + (i + 1) + '. ' + chunk.filename + '</strong>' +
                        '<p>' + preview + '</p>' +
                        '<div class="meta"><span>' + chunk.folder + '</span><span>' + chunk.date + '</span></div>' +
                        '</div>';
                });

                resultsEl.innerHTML = html;

            } catch (error) {
                resultsEl.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
            }
        }

        window.addEventListener('load', loadKB);
        document.getElementById('query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
