<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumulo IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 900px;
            overflow: hidden;
        }

        .logo {
            width: 220px;
            height: 220px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 16px;
        }

        .api-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
            transition: margin 0.2s ease;
        }

        .api-row.collapsed {
            margin-bottom: 0;
        }

        .api-setup {
            flex: 1;
            background: #1a1f2a;
            padding: 14px;
            border-radius: 8px;
            border-left: 3px solid #f59e0b;
            transition: all 0.3s ease;
            text-align: left;
        }

        .api-setup.hidden {
            display: none;
        }

        .api-setup input {
            width: 100%;
            padding: 10px 12px;
            background: #0f1419;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
        }

        .api-setup input::placeholder {
            color: #7c8494;
        }

        .btn-auth {
            width: 42px;
            height: 42px;
            background: #0d7ee6;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-auth:hover {
            background: #0a6bc4;
        }

        .btn-auth svg {
            width: 18px;
            height: 18px;
        }

        .auth-loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #1a1f2a;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 3px solid #0d7ee6;
            color: #aaa;
            font-size: 14px;
            flex-shrink: 0;

        .auth-loading.show {

        }

            height: 18px;

        .api-success {

            background: #1a2f1a;

            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 3px solid #10b981;

        .api-error {

            border-left: 3px solid #ff6b6b;

            justify-content: center;

            animation: fadeIn 0.4s ease-out;

        .msg-row.system .msg-bubble {
            background: transparent;
            border: 1px dashed #333;

        .msg-bubble {
            max-width: 80%;

        .msg-row.user .msg-bubble {

            color: #fff;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;

            border: 1px solid #2f3646;
            border-radius: 10px;
            color: #c6cede;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;

        }

        #searchBtn:hover {

            color: #3b9eff;

        }

        #searchBtn:disabled {

        #searchBtn svg {

        .btn-live:hover {
            background: #1f2938;

        }

        .loading-box {

    </style>

<body>

        </div>

                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            Autenticación correcta
        </div>

        <div class="api-error" id="apiError">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
            Acceso denegado
        </div>

        <div class="search-box" id="searchBox">
            <input type="text" id="query" placeholder="Escribe tu pregunta aquí" disabled>
            <button id="searchBtn" onclick="handleSubmit()" aria-label="Buscar" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button class="btn-live" id="btnLive" onclick="toggleLive()" disabled aria-label="Live">
                <svg id="liveIconHeadset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                    <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
                </svg>
                <span id="liveIconActive" class="live-rec-dot" style="display:none;"></span>
            </button>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="loading-box" id="loadingBox">
            <div class="spinner"></div>
            Buscando...
        </div>
    </div>

    <script>
        let knowledgeBase = [];
        let isAuthenticated = false;
        let isLiveMode = false;
        let qaHistory = [];
        let isProcessing = false;
        let chatModeActive = false;

        // ─── Estado del modo Live ───
        let liveWs = null;
        let liveAudioContext = null;      // captura de micrófono
        let liveMediaStream = null;
        let liveAudioWorklet = null;
        let liveOutputCtx = null;         // reproducción de audio del modelo
        let liveNextStartTime = 0;
        let liveActiveSources = [];
        let liveAnswerId = null;
        let liveInputBuffer = '';
        let liveOutputBuffer = '';
        let liveListeningBubbleId = null;

        const GEMINI_CHAT_MODEL = 'gemini-3.1-flash-lite';
        const GEMINI_LIVE_MODEL = 'gemini-3.1-flash-live-preview';
        const COLORS = ['#10b981', '#0d7ee6', '#f59e0b', '#8b5cf6', '#ec4899'];

        async function loadKB() {
    try {
        const res = await fetch('kb.json');
        const documents = await res.json();
        // Nuevo formato: aplanar chunks de documentos anidados
        knowledgeBase = documents.flatMap(doc => 
            doc.chunks.map(chunk => ({
                ...chunk,
                _doc: doc  // referencia al documento padre
            }))
        );
        console.log('Cargados ' + documents.length + ' documentos, ' + knowledgeBase.length + ' chunks');
    } catch (e) {
        console.error('Error cargando KB:', e);
    }
}

function findRelevantChunks(query) {
    const queryWords = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
    if (queryWords.length === 0) return [];

    return knowledgeBase
        .map(chunk => {
            let score = 0;
            const text = (chunk.text || '').toLowerCase();
            const doc = chunk._doc;
            const filename = (doc.file?.name || '').toLowerCase();
            const section = (chunk.section || '').toLowerCase();
            const docType = (doc.document_type || '').toLowerCase();
            const committee = (doc.committee || '').toLowerCase();

            queryWords.forEach(word => {
                const matches = (text.match(new RegExp(word, 'g')) || []).length;
                score += matches;
                if (filename.includes(word)) score += 5;
                if (section.includes(word)) score += 3;
                if (docType.includes(word)) score += 4;
                if (committee.includes(word)) score += 4;
                if ((doc.keywords || []).some(kw => kw.toLowerCase().includes(word))) score += 2;
            });

            const dateStr = doc.dates?.start;
            if (dateStr) {
                const dateVal = new Date(dateStr).getTime();
                if (!isNaN(dateVal)) {
                    const now = Date.now();
                    const daysDiff = (now - dateVal) / (1000 * 60 * 60 * 24);
                    if (daysDiff < 365) score += 3;
                    if (daysDiff < 90) score += 5;
                    if (daysDiff < 30) score += 8;
                }
            }

            return { chunk, score };
        })
        .filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 5)
        .map(x => x.chunk);
}

        function extractRelevantSnippet(chunkText, queryWords) {
            const text = chunkText.toLowerCase();
            let bestStart = 0;
            let bestScore = -1;
            const windowSize = 80; // ~50 words

            for (let i = 0; i < text.length - windowSize; i += 20) {
                let score = 0;
                const window = text.substring(i, i + windowSize);
                queryWords.forEach(word => {
                    if (window.includes(word)) score++;
                });
                if (score > bestScore) {
                    bestScore = score;
                    bestStart = i;
                }
            }

            let start = bestStart;
            // Expand to word boundaries
            while (start > 0 && chunkText[start - 1] !== ' ' && chunkText[start - 1] !== '\n') start--;
            let end = Math.min(start + windowSize, chunkText.length);
            while (end < chunkText.length && chunkText[end] !== ' ' && chunkText[end] !== '\n') end++;

            let snippet = chunkText.substring(start, end).trim();
            if (start > 0) snippet = '...' + snippet;
            if (end < chunkText.length) snippet = snippet + '...';
            return snippet;
        }

        async function verifyApiKey(apiKey) {
            try {
                const testPrompt = 'Responde únicamente "OK".';
                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_CHAT_MODEL + ':generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: testPrompt }] }]
                        })
                    }
                );
                return response.ok;
            } catch (e) {
                return false;
            }
        }

        function formatMarkdown(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
                .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
                .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
                .replace(/^-\s+(.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.+<\/li>\n?)+/g, '<ul>$&</ul>')
                .replace(/\n/g, '<br>');
        }

        function truncateToWords(text, maxWords) {
            const words = text.trim().split(/\s+/);
            if (words.length <= maxWords) return text;
            return words.slice(0, maxWords).join(' ') + '...';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setInputsDisabled(disabled) {
            document.getElementById('query').disabled = disabled;
            document.getElementById('searchBtn').disabled = disabled;
            document.getElementById('btnLive').disabled = disabled;
            document.getElementById('apiKey').disabled = disabled;
            document.getElementById('btnAuth').disabled = disabled;
        }

        // ─── Transición al modo chat: mueve el buscador al final y oculta el aviso de autenticación ───
        function ensureChatMode() {
            if (chatModeActive) return;
            chatModeActive = true;
            document.getElementById('apiSuccess').classList.remove('show');
            const searchBox = document.getElementById('searchBox');
            document.querySelector('.container').appendChild(searchBox);
        }

        async function authenticate() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const authLoading = document.getElementById('authLoading');
            const apiSuccess = document.getElementById('apiSuccess');
            const apiError = document.getElementById('apiError');
            const apiSetup = document.getElementById('apiSetup');
            const apiRow = document.getElementById('apiRow');

            if (!apiKey) {
                apiError.classList.add('show');
                apiSuccess.classList.remove('show');
                return;
            }

            authLoading.classList.add('show');
            apiSuccess.classList.remove('show');
            apiError.classList.remove('show');
            setInputsDisabled(true);

            const valid = await verifyApiKey(apiKey);

            authLoading.classList.remove('show');

            if (valid) {
                isAuthenticated = true;
                apiSetup.classList.add('hidden');
                document.getElementById('btnAuth').style.display = 'none';
                apiRow.classList.add('collapsed');
                apiSuccess.classList.add('show');
                apiError.classList.remove('show');
                setInputsDisabled(false);
                document.getElementById('query').focus();
            } else {
                apiError.classList.add('show');
                apiSuccess.classList.remove('show');
                setInputsDisabled(false);
                document.getElementById('apiKey').focus();
            }
        }

        function renderDetailPanel(chunks, queryWords, panelId) {
            let html = '<div class="detail-panel" id="' + panelId + '">';
            html += '<h4>Fragmentos encontrados</h4>';

            chunks.forEach((chunk, i) => {
                const color = COLORS[i % COLORS.length];
                const snippet = extractRelevantSnippet(chunk.text, queryWords);
                const doc = chunk._doc;
html += '<div class="detail-chunk" style="border-left-color:' + color + '">' +
    '<div class="chunk-header"><span>' + escapeHtml(doc.file?.name || 'desconocido') + '</span><span>' + escapeHtml(doc.committee || 'general') + '</span><span>' + escapeHtml(doc.dates?.start || 'sin fecha') + '</span></div>' +
    '<div class="chunk-text">' + escapeHtml(snippet).replace(/\n/g, '<br>') + '</div>' +
    '</div>';
            });

            html += '</div>';
            return html;
        }

        function addMessageToChat(question, answer, isLive, chunks) {
            ensureChatMode();
            const chatArea = document.getElementById('chatArea');
            const qaId = 'qa-' + Date.now();
            const panelId = 'detail-' + qaId;
            const btnId = 'btn-info-' + qaId;
            const queryWords = question.toLowerCase().split(/\s+/).filter(w => w.length > 2);

            const liveBadge = isLive ? '<span class="live-badge">Live</span>' : '';

            const userHtml = '<div class="msg-row user" id="' + qaId + '-q">' +
                '<div class="msg-bubble">' + liveBadge + escapeHtml(question) + '</div></div>';

            const detailHtml = chunks && chunks.length > 0 ? renderDetailPanel(chunks, queryWords, panelId) : '';

            const ansHtml = '<div class="msg-row assistant" id="' + qaId + '-a">' +
                '<div class="msg-bubble">' + formatMarkdown(answer) +
                '<div class="msg-meta">' +
                '<button class="btn-info" id="' + btnId + '" onclick="toggleDetail(\'' + btnId + '\', \'' + panelId + '\')" title="Ver fuentes">i</button>' +
                '</div>' +
                detailHtml +
                '</div></div>';

            chatArea.insertAdjacentHTML('beforeend', userHtml + ansHtml);
            chatArea.scrollTop = chatArea.scrollHeight;

            qaHistory.push({ id: qaId, question, answer, chunks, isLive, timestamp: new Date() });

            return qaId;
        }

        function addSystemMessage(text) {
            ensureChatMode();
            const chatArea = document.getElementById('chatArea');
            const html = '<div class="msg-row system"><div class="msg-bubble">' + escapeHtml(text) + '</div></div>';
            chatArea.insertAdjacentHTML('beforeend', html);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function toggleDetail(btnId, panelId) {
            const panel = document.getElementById(panelId);
            const btn = document.getElementById(btnId);
            if (!panel || !btn) return;
            if (panel.classList.contains('show')) {
                panel.classList.remove('show');
                btn.style.borderColor = '#444';
                btn.style.color = '#888';
            } else {
                panel.classList.add('show');
                btn.style.borderColor = '#0d7ee6';
                btn.style.color = '#0d7ee6';
            }
        }

        function handleSubmit() {
            if (isLiveMode) {
                const text = document.getElementById('query').value.trim();
                if (text) {
                    sendLiveText(text);
                    document.getElementById('query').value = '';
                }
            } else {
                search();
            }
        }

        async function search() {
            const query = document.getElementById('query').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();

            if (!isAuthenticated) {
                addMessageToChat('', 'Acceso denegado. Este documento contiene información confidencial. Solicita el código e intenta nuevamente.', false, []);
                return;
            }

            if (isAuthenticated && !query) {
                addMessageToChat('', 'Este buscador te permite consultar información sobre decisiones, actas y procesos del grupo de astronomía Cúmulo. Puedes preguntar sobre reuniones, acuerdos, eventos, proyectos y cualquier documento relevante de la organización.', false, []);
                return;
            }

            if (isProcessing) return;
            isProcessing = true;
            setInputsDisabled(true);

            document.getElementById('loadingBox').classList.add('show');

            try {
                const relevantChunks = findRelevantChunks(query);

                if (relevantChunks.length === 0) {
                    document.getElementById('loadingBox').classList.remove('show');
                    addMessageToChat(query, 'No encontré documentos relevantes. Intenta con otras palabras clave.', false, []);
                    isProcessing = false;
                    setInputsDisabled(false);
                    document.getElementById('query').value = '';
                    document.getElementById('query').focus();
                    return;
                }

                const context = relevantChunks.map(chunk => {
    const doc = chunk._doc;
    const parts = [];
    parts.push('📄 ' + doc.document_id + ' | ' + doc.document_type.toUpperCase() + ' | ' + doc.committee);
    parts.push('📅 Fecha: ' + (doc.dates?.start || 'sin fecha') + ' | Estado: ' + doc.status);
    if (doc.participants?.length > 0) {
        parts.push('👥 Participantes: ' + doc.participants.map(p => p.name + ' (' + p.role + ')').join(', '));
    }
    parts.push('📝 Sección: ' + (chunk.section || 'contenido general'));
    parts.push('');
    parts.push(chunk.text);
    return parts.join('\n');
}).join('\n\n---DOCUMENTO SIGUIENTE---\n\n');

                const prompt = 'Eres un asistente experto en los procesos, decisiones y documentos del grupo de astronomia Cumulo. Analiza los documentos proporcionados y responde de forma breve (menos de 50 palabras) como un análisis conciso basado en la información. Prioriza la información más reciente si hay datos repetidos.\n\nDOCUMENTOS RELEVANTES:\n' + context + '\n\nPREGUNTA DEL USUARIO: ' + query + '\n\nINSTRUCCIONES:\n1. Responde con un análisis breve (menos de 50 palabras) basado ÚNICAMENTE en los documentos\n2. Prioriza la información más reciente\n3. Si la información no está, di "No encontré información"';

                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_CHAT_MODEL + ':generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    }
                );

                const data = await response.json();

                if (!response.ok) {
                    throw new Error((data.error && data.error.message) || 'Error');
                }

                let answer = (data.candidates && data.candidates[0] &&
                    data.candidates[0].content.parts[0].text) || 'No pude generar respuesta';

                answer = truncateToWords(answer, 50);

                document.getElementById('loadingBox').classList.remove('show');
                addMessageToChat(query, answer, false, relevantChunks);

            } catch (error) {
                document.getElementById('loadingBox').classList.remove('show');
                addMessageToChat(query, 'Error: ' + error.message, false, []);
            }

            isProcessing = false;
            setInputsDisabled(false);
            document.getElementById('query').value = '';
            document.getElementById('query').focus();
        }

        // ─── LIVE MODE ───

        function updateLiveButtonUI(active) {
            const btnLive = document.getElementById('btnLive');
            const headsetIcon = document.getElementById('liveIconHeadset');
            const activeIcon = document.getElementById('liveIconActive');
            if (active) {
                btnLive.classList.add('active');
                headsetIcon.style.display = 'none';
                activeIcon.style.display = 'block';
                btnLive.setAttribute('aria-label', 'Detener Live');
            } else {
                btnLive.classList.remove('active');
                headsetIcon.style.display = 'block';
                activeIcon.style.display = 'none';
                btnLive.setAttribute('aria-label', 'Live');
            }
        }

        function showListeningBubble() {
            removeListeningBubble();
            ensureChatMode();
            const chatArea = document.getElementById('chatArea');
            const id = 'listening-' + Date.now();
            liveListeningBubbleId = id;
            const html = '<div class="msg-row user" id="' + id + '">' +
                '<div class="msg-bubble listening-bubble"><span class="live-badge">Live</span>Escuchando...</div></div>';
            chatArea.insertAdjacentHTML('beforeend', html);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeListeningBubble() {
            if (liveListeningBubbleId) {
                const el = document.getElementById(liveListeningBubbleId);
                if (el) el.remove();
                liveListeningBubbleId = null;
            }
        }

        async function toggleLive() {
            if (!isAuthenticated) return;

            if (isLiveMode) {
                stopLiveMode();
            } else {
                startLiveMode();
            }
        }

        async function startLiveMode() {
    const apiKey = document.getElementById('apiKey').value.trim();

    isLiveMode = true;
    updateLiveButtonUI(true);
    liveInputBuffer = '';
    liveOutputBuffer = '';
    liveAnswerId = null;

    addSystemMessage('Modo Live activo — Habla y te escucho');

    // Usar Web Speech API para transcripción local (gratis, sin API key)
    // Fallback: usar Gemini STT si no está disponible
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        startBrowserSpeechRecognition();
    } else {
        // Fallback: usar Gemini para transcribir (más costoso)
        startGeminiSpeechRecognition(apiKey);
    }
}

        function stopLiveMode() {
    const wasLive = isLiveMode;
    isLiveMode = false;
    updateLiveButtonUI(false);
    removeListeningBubble();

    // Detener reconocimiento de voz
    if (speechRecognition) {
        speechRecognition.stop();
        speechRecognition = null;
    }

    // Detener micrófono
    if (liveMediaStream) {
        liveMediaStream.getTracks().forEach(t => t.stop());
        liveMediaStream = null;
    }

    // Detener audio context
    if (liveAudioContext) {
        liveAudioContext.close();
        liveAudioContext = null;
    }

    // Detener TTS
    if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
    }

    liveAnswerId = null;
    liveInputBuffer = '';
    liveOutputBuffer = '';

    if (wasLive) {
        addSystemMessage('Finalizó Modo Live - Escribe para continuar.');
    }
}

let speechRecognition = null;

function startBrowserSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    speechRecognition = new SpeechRecognition();
    speechRecognition.lang = 'es-ES';
    speechRecognition.continuous = true;
    speechRecognition.interimResults = true;

    let finalTranscript = '';
    let silenceTimer = null;

    speechRecognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                finalTranscript += transcript + ' ';
            } else {
                interim += transcript;
            }
        }

        // Mostrar lo que se está escuchando
        if (interim || finalTranscript) {
            showListeningBubble();
            const bubble = document.querySelector('#' + liveListeningBubbleId + ' .msg-bubble');
            if (bubble) {
                bubble.innerHTML = '<span class="live-badge">Live</span>' + escapeHtml(finalTranscript + interim);
            }
        }

        // Detectar pausa para procesar
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
            if (finalTranscript.trim()) {
                processLiveQuery(finalTranscript.trim());
                finalTranscript = '';
            }
        }, 1500); // 1.5 segundos de silencio = procesar
    };

    speechRecognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        if (event.error === 'not-allowed') {
            addSystemMessage('Permiso de micrófono denegado');
            stopLiveMode();
        }
    };

    speechRecognition.onend = () => {
        if (isLiveMode) {
            speechRecognition.start(); // Reiniciar si sigue en modo live
        }
    };

    speechRecognition.start();
}
        
        // ─── Reproducción de audio del modelo ───
        // El audio llega como PCM crudo (sin cabecera), por lo que NO se puede usar
        // decodeAudioData (eso esperaba un archivo codificado tipo WAV/MP3 y fallaba
        // silenciosamente). Aquí se decodifica manualmente y se agenda en cola sobre
        // un único AudioContext persistente para que no se corte ni se solape.

        // Enviar texto durante el modo Live (sin hablar)

        async function processLiveQuery(queryText) {
    removeListeningBubble();

    // 1. Buscar chunks relevantes (igual que en modo chat)
    const relevantChunks = findRelevantChunks(queryText);
    
    // 2. Armar contexto enriquecido (igual que en modo chat)
    let context = '';
    if (relevantChunks.length > 0) {
        context = relevantChunks.map(chunk => {
            const doc = chunk._doc;
            const parts = [];
            parts.push('📄 ' + doc.document_id + ' | ' + doc.document_type.toUpperCase() + ' | ' + doc.committee);
            parts.push('📅 Fecha: ' + (doc.dates?.start || 'sin fecha') + ' | Estado: ' + doc.status);
            if (doc.participants?.length > 0) {
                parts.push('👥 Participantes: ' + doc.participants.map(p => p.name + ' (' + p.role + ')').join(', '));
            }
            parts.push('📝 Sección: ' + (chunk.section || 'contenido general'));
            parts.push('');
            parts.push(chunk.text);
            return parts.join('\n');
        }).join('\n\n---DOCUMENTO SIGUIENTE---\n\n');
    }

    // 3. Mostrar pregunta del usuario
    liveAnswerId = 'live-' + Date.now();
    const qHtml = '<div class="msg-row user" id="' + liveAnswerId + '-q"><div class="msg-bubble"><span class="live-badge">Live</span>' + escapeHtml(queryText) + '</div></div>';
    const aHtml = '<div class="msg-row assistant" id="' + liveAnswerId + '-a"><div class="msg-bubble"><span class="live-badge">Live</span><span class="live-answer-text">Pensando...</span></div></div>';
    document.getElementById('chatArea').insertAdjacentHTML('beforeend', qHtml + aHtml);
    document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;

    // 4. Consultar backend
    try {
        const apiKey = document.getElementById('apiKey').value.trim();
        const response = await fetch('/api/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                query: queryText,
                context: context,
                mode: 'live'
            })
        });

        const data = await response.json();
        let answer = 'No pude generar respuesta';

        if (response.ok && data.candidates && data.candidates[0]) {
            answer = data.candidates[0].content.parts[0].text;
        } else if (data.error) {
            answer = 'Error: ' + data.error.message;
        }

        // 5. Mostrar respuesta
        const ansTextEl = document.querySelector('#' + liveAnswerId + '-a .live-answer-text');
        if (ansTextEl) {
            ansTextEl.innerHTML = formatMarkdown(answer);
        }

        // 6. Guardar en historial
        qaHistory.push({
            id: liveAnswerId,
            question: queryText,
            answer: answer,
            chunks: relevantChunks,
            isLive: true,
            timestamp: new Date()
        });

        // 7. Leer en voz alta (Text-to-Speech)
        speakText(answer);

    } catch (error) {
        const ansTextEl = document.querySelector('#' + liveAnswerId + '-a .live-answer-text');
        if (ansTextEl) {
            ansTextEl.textContent = 'Error de conexión';
        }
    }

    liveAnswerId = null;
    if (isLiveMode) showListeningBubble();
}

        function speakText(text) {
    if (!window.speechSynthesis) return;
    
    // Limpiar markdown para lectura
    const cleanText = text
        .replace(/\*\*(.+?)\*\*/g, '$1')
        .replace(/\*(.+?)\*/g, '$1')
        .replace(/#{1,3}\s+(.+)/g, '$1.')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');

    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = 'es-ES';
    utterance.rate = 1.1;
    utterance.pitch = 1;

    // Cancelar cualquier lectura anterior
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
}

        window.addEventListener('load', loadKB);
        document.getElementById('query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSubmit();
            }
        });
