<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cúmulo IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #0d7ee6, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #query {
            flex: 1;
            padding: 14px 16px;
            background: #1a1f2a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: all 0.2s;
        }

        #query:focus {
            outline: none;
            border-color: #0d7ee6;
            box-shadow: 0 0 0 3px rgba(13, 126, 230, 0.1);
        }

        #query::placeholder {
            color: #666;
        }

        button {
            padding: 14px 28px;
            background: #0d7ee6;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(13, 126, 230, 0.3);
        }

        button:hover {
            background: #0a5fb3;
            box-shadow: 0 6px 12px rgba(13, 126, 230, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
            box-shadow: none;
        }

        .results {
            display: none;
            margin-top: 30px;
            text-align: left;
        }

        .results.show {
            display: block;
        }

        .result-item {
            background: #1a1f2a;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 8px;
            border-left: 4px solid #10b981;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item.source {
            border-left-color: #8b5cf6;
        }

        .result-item.answer {
            background: linear-gradient(135deg, #0f2a1a 0%, #1a2d1e 100%);
            border-left-color: #10b981;
            font-size: 15px;
            line-height: 1.8;
        }

        .result-item.answer strong {
            color: #10b981;
            display: block;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .result-item.answer p {
            color: #1a1a1a;
            background: #e0e0e0;
            padding: 12px;
            border-radius: 6px;
            line-height: 1.7;
        }

        .result-item strong {
            color: #1a1a1a;
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            background: #e0e0e0;
            padding: 8px 10px;
            border-radius: 4px;
        }

        .result-item p {
            color: #1a1a1a;
            line-height: 1.6;
            margin-bottom: 8px;
            background: #e0e0e0;
            padding: 10px;
            border-radius: 4px;
        }

        .meta {
            font-size: 12px;
            color: #1a1a1a;
            margin-top: 12px;
            padding: 10px;
            background: #e0e0e0;
            border-radius: 4px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 16px;
        }

        .loading::after {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            margin-left: 8px;
            background: #0d7ee6;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .error {
            color: #ff6b6b;
            background: #2a1a1a;
            padding: 16px;
            border-radius: 6px;
            border-left: 4px solid #ff6b6b;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .no-results strong {
            display: block;
            font-size: 18px;
            margin-bottom: 8px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 14px;
            }

            .search-box {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="icon.png" alt="Cúmulo Logo" onerror="this.style.display='none'">
        </div>

        <h1>Cúmulo IA</h1>
        <p class="subtitle">
            Bienvenido a Cúmulo IA, aquí puedes preguntar todo sobre las decisiones actuales de Cúmulo.
        </p>

        <div class="search-box">
            <input type="text" id="query" placeholder="¿Cómo se eligen los coordinadores? ¿Cuáles decisiones fueron anuladas?">
            <button onclick="search()">🔍</button>
        </div>

        <div id="results" class="results"></div>
    </div>

    <script>
        let knowledgeBase = [];

        // Cargar la base de conocimiento
        async function loadKB() {
            try {
                const res = await fetch('kb.json');
                knowledgeBase = await res.json();
                console.log(`✓ Cargados ${knowledgeBase.length} chunks`);
            } catch (e) {
                console.error('Error cargando KB:', e);
                document.getElementById('results').classList.add('show');
                document.getElementById('results').innerHTML =
                    '<div class="error">❌ Error cargando base de conocimiento.</div>';
            }
        }

        // Búsqueda simple: encuentra chunks relevantes
        function findRelevantChunks(query) {
            const queryWords = query.toLowerCase()
                .split(/\s+/)
                .filter(w => w.length > 2);

            return knowledgeBase
                .map(chunk => {
                    let score = 0;
                    const text = chunk.text.toLowerCase();
                    const filename = chunk.filename.toLowerCase();

                    queryWords.forEach(word => {
                        const textMatches = (text.match(new RegExp(word, 'g')) || []).length;
                        score += textMatches * 1;

                        if (filename.includes(word)) {
                            score += 5;
                        }
                    });

                    return { chunk, score };
                })
                .filter(x => x.score > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, 5)
                .map(x => x.chunk);
        }

        // Llamar a Gemini API
        async function search() {
            const query = document.getElementById('query').value.trim();

            if (!query) {
                alert('Escribe una pregunta');
                return;
            }

            document.getElementById('results').innerHTML = '<div class="loading">Buscando y procesando respuesta</div>';
            document.getElementById('results').classList.add('show');

            try {
                const relevantChunks = findRelevantChunks(query);

                if (relevantChunks.length === 0) {
                    document.getElementById('results').innerHTML =
                        '<div class="no-results"><strong>No encontré documentos relevantes.</strong><p>Intenta con palabras clave diferentes.</p></div>';
                    return;
                }

                const context = relevantChunks
                    .map(c => `[${c.folder} - ${c.date}]\n${c.text}`)
                    .join('\n\n---DOCUMENTO SIGUIENTE---\n\n');

                // Llamar al backend en Vercel
                const response = await fetch('https://juslozanoma-6059.vercel.app/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: query,
                        context: context
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || 'Error en el servidor');
                }

                const answer = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No pude generar respuesta';

                let html = `
                    <div class="result-item answer">
                        <strong>💡 Respuesta:</strong>
                        <p>${answer.replace(/\n/g, '<br>')}</p>
                    </div>
                `;

                html += '<div style="margin-top: 20px; margin-bottom: 16px; color: #666; font-size: 12px;">📄 Documentos usados:</div>';

                relevantChunks.forEach((chunk, i) => {
                    html += `
                        <div class="result-item source">
                            <strong>${i + 1}. ${chunk.filename}</strong>
                            <p>${chunk.text.substring(0, 200)}${chunk.text.length > 200 ? '...' : ''}</p>
                            <div class="meta">
                                <span>📁 ${chunk.folder}</span>
                                <span>📅 ${chunk.date}</span>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('results').innerHTML = html;

            } catch (error) {
                document.getElementById('results').innerHTML =
                    `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        // Cargar cuando la página se carga
        window.addEventListener('load', loadKB);

        // Enter para buscar
        document.getElementById('query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
