<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumulo IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 900px;
            overflow: hidden;
        }

        .logo {
            width: 220px;
            height: 220px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 16px;
        }

        .api-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
            transition: margin 0.2s ease;
        }

        .api-row.collapsed {
            margin-bottom: 0;
        }

        .api-setup {
            flex: 1;
            background: #1a1f2a;
            padding: 14px;
            border-radius: 8px;
            border-left: 3px solid #f59e0b;
            transition: all 0.3s ease;
            text-align: left;
        }

        .api-setup.hidden {
            display: none;
        }

        .api-setup input {
            width: 100%;
            padding: 10px 12px;
            background: #0f1419;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
        }

        .api-setup input::placeholder {
            color: #7c8494;
        }

        .btn-auth {
            width: 42px;
            height: 42px;
            background: #0d7ee6;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-auth:hover {
            background: #0a6bc4;
        }

        .btn-auth svg {
            width: 18px;
            height: 18px;
        }

        .auth-loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #1a1f2a;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 3px solid #0d7ee6;
            color: #aaa;
            font-size: 14px;
            flex-shrink: 0;
        }

        .auth-loading.show {
            display: flex;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #333;
            border-top-color: #0d7ee6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .api-success {
            display: none;
            background: #1a2f1a;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 3px solid #10b981;
            color: #10b981;
            font-size: 14px;
            font-weight: 500;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
            flex-shrink: 0;
        }

        .api-success.show {
            display: flex;
        }

        .api-success svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .api-error {
            display: none;
            background: #2a1a1a;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 3px solid #ff6b6b;
            color: #ff6b6b;
            font-size: 14px;
            font-weight: 500;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
            flex-shrink: 0;
        }

        .api-error.show {
            display: flex;
        }

        .api-error svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 8px 4px;
            margin-bottom: 12px;
            min-height: 0;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #2a2f3a;
            border-radius: 4px;
        }

        .msg-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            animation: slideIn 0.3s ease-out;
        }

        .msg-row.user {
            flex-direction: row-reverse;
        }

        .msg-row.assistant {
            flex-direction: row;
        }

        .msg-row.system {
            justify-content: center;
        }

        .msg-row.system .msg-bubble {
            background: transparent;
            border: 1px dashed #333;
            color: #8a93a6;
            font-size: 12px;
            padding: 8px 14px;
            border-radius: 20px;
        }

        .msg-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            text-align: left;
            position: relative;
        }

        .msg-row.user .msg-bubble {
            background: #0d7ee6;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-row.assistant .msg-bubble {
            background: #1e2330;
            color: #e8e8e8;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2f3a;
        }

        .msg-bubble p {
            margin-bottom: 6px;
        }

        .msg-bubble p:last-child {
            margin-bottom: 0;
        }

        .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
            color: #fff;
            margin: 8px 0 6px 0;
            font-size: 15px;
        }

        .msg-bubble ul, .msg-bubble ol {
            margin: 6px 0 6px 18px;
        }

        .msg-bubble li {
            margin-bottom: 3px;
        }

        .msg-bubble b, .msg-bubble strong {
            color: #fff;
            font-weight: 600;
        }

        .msg-bubble em {
            color: #ccc;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 8px;
            font-size: 11px;
            color: #777;
        }

        .msg-row.user .msg-meta {
            justify-content: flex-start;
        }

        .btn-info {
            width: 22px;
            height: 22px;
            background: transparent;
            border: 1px solid #444;
            border-radius: 50%;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-info:hover {
            border-color: #0d7ee6;
            color: #0d7ee6;
        }

        .detail-panel {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #333;
        }

        .detail-panel.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .detail-panel h4 {
            color: #888;
            font-size: 11px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-chunk {
            background: #161b26;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid;
            font-size: 12px;
            color: #999;
            line-height: 1.5;
        }

        .detail-chunk .chunk-header {
            color: #777;
            font-size: 10px;
            margin-bottom: 4px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .detail-chunk .chunk-text {
            color: #bbb;
        }

        .live-badge {
            display: inline-block;
            background: #ff6b6b;
            color: #fff;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: 6px;
            vertical-align: middle;
        }

        .listening-bubble {
            font-style: italic;
            color: #aaa !important;
            animation: pulseOpacity 1.4s ease-in-out infinite;
        }

        @keyframes pulseOpacity {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .search-box {
            position: relative;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
            margin-bottom: 12px;
        }

        #query {
            flex: 1;
            padding: 14px 16px;
            background: #0c0f16;
            border: 1px solid #3a4257;
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #query:focus {
            outline: none;
            border-color: #3b9eff;
            box-shadow: 0 0 0 3px rgba(59, 158, 255, 0.15);
        }

        #query::placeholder {
            color: #8891a5;
        }

        #query:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #searchBtn, .btn-live {
            width: 44px;
            height: 44px;
            background: #161b26;
            border: 1px solid #2f3646;
            border-radius: 10px;
            color: #c6cede;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #searchBtn:hover {
            background: #1f2938;
            color: #3b9eff;
            border-color: #3b9eff;
        }

        #searchBtn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #searchBtn svg {
            width: 18px;
            height: 18px;
        }

        .btn-live:hover {
            background: #1f2938;
            color: #22c58b;
            border-color: #22c58b;
        }

        .btn-live:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-live.active {
            background: #3a1414;
            border-color: #ff5252;
            color: #ff5252;
        }

        .btn-live.active:hover {
            background: #3a1414;
        }

        .btn-live svg {
            width: 20px;
            height: 20px;
        }

        .live-rec-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff3b3b;
            animation: liveBlink 1s infinite;
        }

        @keyframes liveBlink {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.6); }
            70% { box-shadow: 0 0 0 8px rgba(255, 59, 59, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-box {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            color: #888;
            font-size: 14px;
            flex-shrink: 0;
        }

        .loading-box.show {
            display: flex;
        }

        .no-results {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>

<body>
    <div class="container">
        <div class="logo">
            <img src="icon.png" alt="Cumulo" onerror="this.style.display='none'">
        </div>

        <div class="api-row" id="apiRow">
            <div class="api-setup" id="apiSetup">
                <input type="password" id="apiKey" placeholder="Bienvenido, por favor ingresa tu código de acceso para continuar..." onkeypress="if(event.key==='Enter') authenticate()">
            </div>
            <button class="btn-auth" id="btnAuth" onclick="authenticate()" aria-label="Autenticar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

        <div class="auth-loading" id="authLoading">
            <div class="spinner"></div>
            Realizando autenticacion...
        </div>

        <div class="api-success" id="apiSuccess">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            Autenticacion correcta
        </div>

        <div class="api-error" id="apiError">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
            Acceso denegado
        </div>

        <div class="search-box" id="searchBox">
            <input type="text" id="query" placeholder="Escribe tu pregunta aqui" disabled>
            <button id="searchBtn" onclick="handleSubmit()" aria-label="Buscar" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button class="btn-live" id="btnLive" onclick="toggleLive()" disabled aria-label="Live">
                <svg id="liveIconHeadset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                    <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
                </svg>
                <span id="liveIconActive" class="live-rec-dot" style="display:none;"></span>
            </button>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="loading-box" id="loadingBox">
            <div class="spinner"></div>
            Buscando...
        </div>
    </div>

    <script>
        // ===================================================================
        // CONFIGURACION Y ESTADO GLOBAL
        // ===================================================================
        let knowledgeBase = [];
        let isAuthenticated = false;
        let isLiveMode = false;
        let qaHistory = [];
        let isProcessing = false;
        let chatModeActive = false;

        // ─── Estado del modo Live (WebSocket a Gemini Live) ───
        let liveWs = null;
        let liveAudioContext = null;
        let liveMediaStream = null;
        let liveAudioWorklet = null;
        let liveOutputCtx = null;
        let liveNextStartTime = 0;
        let liveActiveSources = [];
        let liveAnswerId = null;
        let liveInputBuffer = '';
        let liveOutputBuffer = '';
        let liveListeningBubbleId = null;

        // KB en formato plano para busqueda rapida (se carga al inicio)
        let kbDocuments = [];

        const GEMINI_CHAT_MODEL = 'gemini-3.1-flash-lite';
        const GEMINI_LIVE_MODEL = 'gemini-3.1-flash-live-preview';
        const COLORS = ['#10b981', '#0d7ee6', '#f59e0b', '#8b5cf6', '#ec4899'];

        // ===================================================================
        // CARGA DE BASE DE CONOCIMIENTO
        // ===================================================================
        async function loadKB() {
            try {
                const res = await fetch('kb.json');
                kbDocuments = await res.json();
                // Aplanar chunks para busqueda
                knowledgeBase = kbDocuments.flatMap(doc =>
                    doc.chunks.map(chunk => ({
                        ...chunk,
                        _doc: doc
                    }))
                );
                console.log('Cargados ' + kbDocuments.length + ' documentos, ' + knowledgeBase.length + ' chunks');
            } catch (e) {
                console.error('Error cargando KB:', e);
            }
        }

        // ===================================================================
        // BUSQUEDA DE CHUNKS RELEVANTES
        // ===================================================================
        function findRelevantChunks(query) {
            const queryWords = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
            if (queryWords.length === 0) return [];

            return knowledgeBase
                .map(chunk => {
                    let score = 0;
                    const text = (chunk.text || '').toLowerCase();
                    const doc = chunk._doc;
                    const filename = (doc.file?.name || '').toLowerCase();
                    const section = (chunk.section || '').toLowerCase();
                    const docType = (doc.document_type || '').toLowerCase();
                    const committee = (doc.committee || '').toLowerCase();

                    queryWords.forEach(word => {
                        const matches = (text.match(new RegExp(word, 'g')) || []).length;
                        score += matches;
                        if (filename.includes(word)) score += 5;
                        if (section.includes(word)) score += 3;
                        if (docType.includes(word)) score += 4;
                        if (committee.includes(word)) score += 4;
                        if ((doc.keywords || []).some(kw => kw.toLowerCase().includes(word))) score += 2;
                    });

                    const dateStr = doc.dates?.start;
                    if (dateStr) {
                        const dateVal = new Date(dateStr).getTime();
                        if (!isNaN(dateVal)) {
                            const now = Date.now();
                            const daysDiff = (now - dateVal) / (1000 * 60 * 60 * 24);
                            if (daysDiff < 365) score += 3;
                            if (daysDiff < 90) score += 5;
                            if (daysDiff < 30) score += 8;
                        }
                    }

                    return { chunk, score };
                })
                .filter(x => x.score > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, 5)
                .map(x => x.chunk);
        }

        // ===================================================================
        // EXTRACCION DE SNIPPETS
        // ===================================================================
        function extractRelevantSnippet(chunkText, queryWords) {
            const text = chunkText.toLowerCase();
            let bestStart = 0;
            let bestScore = -1;
            const windowSize = 80;

            for (let i = 0; i < text.length - windowSize; i += 20) {
                let score = 0;
                const window = text.substring(i, i + windowSize);
                queryWords.forEach(word => {
                    if (window.includes(word)) score++;
                });
                if (score > bestScore) {
                    bestScore = score;
                    bestStart = i;
                }
            }

            let start = bestStart;
            while (start > 0 && chunkText[start - 1] !== ' ' && chunkText[start - 1] !== '\n') start--;
            let end = Math.min(start + windowSize, chunkText.length);
            while (end < chunkText.length && chunkText[end] !== ' ' && chunkText[end] !== '\n') end++;

            let snippet = chunkText.substring(start, end).trim();
            if (start > 0) snippet = '...' + snippet;
            if (end < chunkText.length) snippet = snippet + '...';
            return snippet;
        }

        // ===================================================================
        // CONSTRUIR CONTEXTO PARA PROMPT
        // ===================================================================
        function buildContext(chunks) {
            if (!chunks || chunks.length === 0) return 'No se encontraron documentos relevantes.';
            return chunks.map(chunk => {
                const doc = chunk._doc;
                const parts = [];
                parts.push('📄 ' + doc.document_id + ' | ' + doc.document_type.toUpperCase() + ' | ' + doc.committee);
                parts.push('📅 Fecha: ' + (doc.dates?.start || 'sin fecha') + ' | Estado: ' + doc.status);
                if (doc.participants?.length > 0) {
                    parts.push('👥 Participantes: ' + doc.participants.map(p => p.name + ' (' + p.role + ')').join(', '));
                }
                parts.push('📝 Seccion: ' + (chunk.section || 'contenido general'));
                parts.push('');
                parts.push(chunk.text);
                return parts.join('\n');
            }).join('\n\n---DOCUMENTO SIGUIENTE---\n\n');
        }

        // ===================================================================
        // UTILIDADES
        // ===================================================================
        async function verifyApiKey(apiKey) {
            try {
                const testPrompt = 'Responde unicamente "OK".';
                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_CHAT_MODEL + ':generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: testPrompt }] }]
                        })
                    }
                );
                return response.ok;
            } catch (e) {
                return false;
            }
        }

        function formatMarkdown(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
                .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
                .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
                .replace(/^-\s+(.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.+<\/li>\n?)+/g, '<ul>$&</ul>')
                .replace(/\n/g, '<br>');
        }

        function truncateToWords(text, maxWords) {
            const words = text.trim().split(/\s+/);
            if (words.length <= maxWords) return text;
            return words.slice(0, maxWords).join(' ') + '...';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setInputsDisabled(disabled) {
            document.getElementById('query').disabled = disabled;
            document.getElementById('searchBtn').disabled = disabled;
            document.getElementById('btnLive').disabled = disabled;
            document.getElementById('apiKey').disabled = disabled;
            document.getElementById('btnAuth').disabled = disabled;
        }

        // ===================================================================
        // UI - MODO CHAT
        // ===================================================================
        function ensureChatMode() {
            if (chatModeActive) return;
            chatModeActive = true;
            document.getElementById('apiSuccess').classList.remove('show');
            const searchBox = document.getElementById('searchBox');
            document.querySelector('.container').appendChild(searchBox);
        }

        async function authenticate() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const authLoading = document.getElementById('authLoading');
            const apiSuccess = document.getElementById('apiSuccess');
            const apiError = document.getElementById('apiError');
            const apiSetup = document.getElementById('apiSetup');
            const apiRow = document.getElementById('apiRow');

            if (!apiKey) {
                apiError.classList.add('show');
                apiSuccess.classList.remove('show');
                return;
            }

            authLoading.classList.add('show');
            apiSuccess.classList.remove('show');
            apiError.classList.remove('show');
            setInputsDisabled(true);

            const valid = await verifyApiKey(apiKey);

            authLoading.classList.remove('show');

            if (valid) {
                isAuthenticated = true;
                apiSetup.classList.add('hidden');
                document.getElementById('btnAuth').style.display = 'none';
                apiRow.classList.add('collapsed');
                apiSuccess.classList.add('show');
                apiError.classList.remove('show');
                setInputsDisabled(false);
                document.getElementById('query').focus();
            } else {
                apiError.classList.add('show');
                apiSuccess.classList.remove('show');
                setInputsDisabled(false);
                document.getElementById('apiKey').focus();
            }
        }

        function renderDetailPanel(chunks, queryWords, panelId) {
            let html = '<div class="detail-panel" id="' + panelId + '">';
            html += '<h4>Fragmentos encontrados</h4>';

            chunks.forEach((chunk, i) => {
                const color = COLORS[i % COLORS.length];
                const snippet = extractRelevantSnippet(chunk.text, queryWords);
                const doc = chunk._doc;
                html += '<div class="detail-chunk" style="border-left-color:' + color + '">' +
                    '<div class="chunk-header"><span>' + escapeHtml(doc.file?.name || 'desconocido') + '</span><span>' + escapeHtml(doc.committee || 'general') + '</span><span>' + escapeHtml(doc.dates?.start || 'sin fecha') + '</span></div>' +
                    '<div class="chunk-text">' + escapeHtml(snippet).replace(/\n/g, '<br>') + '</div>' +
                    '</div>';
            });

            html += '</div>';
            return html;
        }

        function addMessageToChat(question, answer, isLive, chunks) {
            ensureChatMode();
            const chatArea = document.getElementById('chatArea');
            const qaId = 'qa-' + Date.now();
            const panelId = 'detail-' + qaId;
            const btnId = 'btn-info-' + qaId;
            const queryWords = question.toLowerCase().split(/\s+/).filter(w => w.length > 2);

            const liveBadge = isLive ? '<span class="live-badge">Live</span>' : '';

            const userHtml = '<div class="msg-row user" id="' + qaId + '-q">' +
                '<div class="msg-bubble">' + liveBadge + escapeHtml(question) + '</div></div>';

            const detailHtml = chunks && chunks.length > 0 ? renderDetailPanel(chunks, queryWords, panelId) : '';

            const ansHtml = '<div class="msg-row assistant" id="' + qaId + '-a">' +
                '<div class="msg-bubble">' + formatMarkdown(answer) +
                '<div class="msg-meta">' +
                '<button class="btn-info" id="' + btnId + '" onclick="toggleDetail(\'' + btnId + '\', \'' + panelId + '\')" title="Ver fuentes">i</button>' +
                '</div>' +
                detailHtml +
                '</div></div>';

            chatArea.insertAdjacentHTML('beforeend', userHtml + ansHtml);
            chatArea.scrollTop = chatArea.scrollHeight;

            qaHistory.push({ id: qaId, question, answer, chunks, isLive, timestamp: new Date() });

            return qaId;
        }

        function addSystemMessage(text) {
            ensureChatMode();
            const chatArea = document.getElementById('chatArea');
            const html = '<div class="msg-row system"><div class="msg-bubble">' + escapeHtml(text) + '</div></div>';
            chatArea.insertAdjacentHTML('beforeend', html);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function toggleDetail(btnId, panelId) {
            const panel = document.getElementById(panelId);
            const btn = document.getElementById(btnId);
            if (!panel || !btn) return;
            if (panel.classList.contains('show')) {
                panel.classList.remove('show');
                btn.style.borderColor = '#444';
                btn.style.color = '#888';
            } else {
                panel.classList.add('show');
                btn.style.borderColor = '#0d7ee6';
                btn.style.color = '#0d7ee6';
            }
        }

        function handleSubmit() {
            if (isLiveMode) {
                const text = document.getElementById('query').value.trim();
                if (text) {
                    sendLiveText(text);
                    document.getElementById('query').value = '';
                }
            } else {
                search();
            }
        }

        // ===================================================================
        // MODO CHAT - BUSQUEDA HTTP
        // ===================================================================
        async function search() {
            const query = document.getElementById('query').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();

            if (!isAuthenticated) {
                addMessageToChat('', 'Acceso denegado. Este documento contiene informacion confidencial. Solicita el codigo e intenta nuevamente.', false, []);
                return;
            }

            if (isAuthenticated && !query) {
                addMessageToChat('', 'Este buscador te permite consultar informacion sobre decisiones, actas y procesos del grupo de astronomia Cumulo. Puedes preguntar sobre reuniones, acuerdos, eventos, proyectos y cualquier documento relevante de la organizacion.', false, []);
                return;
            }

            if (isProcessing) return;
            isProcessing = true;
            setInputsDisabled(true);

            document.getElementById('loadingBox').classList.add('show');

            try {
                const relevantChunks = findRelevantChunks(query);

                if (relevantChunks.length === 0) {
                    document.getElementById('loadingBox').classList.remove('show');
                    addMessageToChat(query, 'No encontre documentos relevantes. Intenta con otras palabras clave.', false, []);
                    isProcessing = false;
                    setInputsDisabled(false);
                    document.getElementById('query').value = '';
                    document.getElementById('query').focus();
                    return;
                }

                const context = buildContext(relevantChunks);

                const prompt = 'Eres un asistente experto en los procesos, decisiones y documentos del grupo de astronomia Cumulo. Analiza los documentos proporcionados y responde de forma breve (menos de 50 palabras) como un analisis conciso basado en la informacion. Prioriza la informacion mas reciente si hay datos repetidos.\n\nDOCUMENTOS RELEVANTES:\n' + context + '\n\nPREGUNTA DEL USUARIO: ' + query + '\n\nINSTRUCCIONES:\n1. Responde con un analisis breve (menos de 50 palabras) basado UNICAMENTE en los documentos\n2. Prioriza la informacion mas reciente\n3. Si la informacion no esta, di "No encontre informacion"';

                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_CHAT_MODEL + ':generateContent?key=' + apiKey,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    }
                );

                const data = await response.json();

                if (!response.ok) {
                    throw new Error((data.error && data.error.message) || 'Error');
                }

                let answer = (data.candidates && data.candidates[0] &&
                    data.candidates[0].content.parts[0].text) || 'No pude generar respuesta';

                answer = truncateToWords(answer, 50);

                document.getElementById('loadingBox').classList.remove('show');
                addMessageToChat(query, answer, false, relevantChunks);

            } catch (error) {
                document.getElementById('loadingBox').classList.remove('show');
                addMessageToChat(query, 'Error: ' + error.message, false, []);
            }

            isProcessing = false;
            setInputsDisabled(false);
            document.getElementById('query').value = '';
            document.getElementById('query').focus();
        }

        // ===================================================================
        // MODO LIVE - WEBSOCKET A GEMINI LIVE CON KB EN SYSTEM INSTRUCTION
        // ===================================================================

        function updateLiveButtonUI(active) {
            const btnLive = document.getElementById('btnLive');
            const headsetIcon = document.getElementById('liveIconHeadset');
            const activeIcon = document.getElementById('liveIconActive');
            if (active) {
                btnLive.classList.add('active');
                headsetIcon.style.display = 'none';
                activeIcon.style.display = 'block';
                btnLive.setAttribute('aria-label', 'Detener Live');
            } else {
                btnLive.classList.remove('active');
                headsetIcon.style.display = 'block';
                activeIcon.style.display = 'none';
                btnLive.setAttribute('aria-label', 'Live');
            }
        }

        function showListeningBubble() {
            removeListeningBubble();
            ensureChatMode();
            const chatArea = document.getElementById('chatArea');
            const id = 'listening-' + Date.now();
            liveListeningBubbleId = id;
            const html = '<div class="msg-row user" id="' + id + '">' +
                '<div class="msg-bubble listening-bubble"><span class="live-badge">Live</span>Escuchando...</div></div>';
            chatArea.insertAdjacentHTML('beforeend', html);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeListeningBubble() {
            if (liveListeningBubbleId) {
                const el = document.getElementById(liveListeningBubbleId);
                if (el) el.remove();
                liveListeningBubbleId = null;
            }
        }

        async function toggleLive() {
            if (!isAuthenticated) return;

            if (isLiveMode) {
                stopLiveMode();
            } else {
                startLiveMode();
            }
        }

        // ─── Construir system instruction con KB ───
        function buildLiveSystemInstruction() {
            // Tomar los 3 documentos mas recientes como contexto base
            const recentDocs = [...kbDocuments]
                .filter(d => d.dates?.start)
                .sort((a, b) => new Date(b.dates.start) - new Date(a.dates.start))
                .slice(0, 3);

            let kbContext = '';
            if (recentDocs.length > 0) {
                kbContext = '\n\nDOCUMENTOS DE REFERENCIA (Cumulo):\n' +
                    recentDocs.map(doc => {
                        const parts = [];
                        parts.push('[' + doc.document_id + ' | ' + doc.document_type + ' | ' + doc.committee + ']');
                        parts.push('Fecha: ' + (doc.dates?.start || 'N/A') + ' | Estado: ' + doc.status);
                        parts.push(doc.summary || '');
                        return parts.join('\n');
                    }).join('\n\n---\n\n');
            }

            return 'Eres un asistente experto en los procesos, decisiones y documentos del grupo de astronomia Cumulo. Responde de forma breve, clara y concisa como en una conversacion de voz. Si no sabes algo, di "No tengo esa informacion".\n' +
                kbContext +
                '\n\nINSTRUCCIONES:\n1. Responde en maximo 30 palabras\n2. Usa un tono conversacional y amigable\n3. Si preguntan por algo especifico de los documentos, usa la informacion proporcionada\n4. Si no estas seguro, di "No tengo esa informacion"';
        }

        async function startLiveMode() {
            const apiKey = document.getElementById('apiKey').value.trim();

            isLiveMode = true;
            updateLiveButtonUI(true);
            liveInputBuffer = '';
            liveOutputBuffer = '';
            liveAnswerId = null;

            addSystemMessage('Modo Live activo — Puedes hablar');

            // Conectar WebSocket a Gemini Live
            const wsUrl = 'wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=' + apiKey;

            try {
                liveWs = new WebSocket(wsUrl);

                liveWs.onopen = () => {
                    console.log('Live WebSocket connected');
                    liveWs.send(JSON.stringify({
                        setup: {
                            model: 'models/' + GEMINI_LIVE_MODEL,
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: {
                                            voiceName: "Puck"
                                        }
                                    }
                                }
                            },
                            systemInstruction: {
                                parts: [{ text: buildLiveSystemInstruction() }]
                            },
                            inputAudioTranscription: {},
                            outputAudioTranscription: {}
                        }
                    }));
                };

                liveWs.onmessage = async (event) => {
    let response;
    if (event.data instanceof Blob) {
        const text = await event.data.text();
        response = JSON.parse(text);
    } else {
        response = JSON.parse(event.data);
    }
                    console.log('Live response:', response);

                    if (response.setupComplete) {
                        console.log('Live setup complete');
                        startMicrophoneCapture();
                        showListeningBubble();
                    }

                    if (response.serverContent) {
                        const sc = response.serverContent;
                        const chatArea = document.getElementById('chatArea');

                        // Interrupcion
                        if (sc.interrupted) {
                            stopAllLiveAudio();
                        }

                        // Transcripcion de entrada (usuario hablando)
                        if (sc.inputTranscription && typeof sc.inputTranscription.text === 'string') {
                            liveInputBuffer += sc.inputTranscription.text;
                        }

                        // Transcripcion de salida (modelo respondiendo)
                        if (sc.outputTranscription && typeof sc.outputTranscription.text === 'string') {
                            if (!liveAnswerId) {
                                removeListeningBubble();
                                liveAnswerId = 'live-' + Date.now();
                                const qText = liveInputBuffer.trim() || '(entrada de voz)';
                                const qHtml = '<div class="msg-row user" id="' + liveAnswerId + '-q"><div class="msg-bubble"><span class="live-badge">Live</span>' + escapeHtml(qText) + '</div></div>';
                                const aHtml = '<div class="msg-row assistant" id="' + liveAnswerId + '-a"><div class="msg-bubble"><span class="live-badge">Live</span><span class="live-answer-text"></span></div></div>';
                                chatArea.insertAdjacentHTML('beforeend', qHtml + aHtml);
                                liveOutputBuffer = '';
                            }
                            liveOutputBuffer += sc.outputTranscription.text;
                            const ansTextEl = document.querySelector('#' + liveAnswerId + '-a .live-answer-text');
                            if (ansTextEl) ansTextEl.innerHTML = formatMarkdown(liveOutputBuffer);
                            chatArea.scrollTop = chatArea.scrollHeight;
                        }

                        // Turno completo
                        if (sc.turnComplete) {
                            if (liveAnswerId) {
                                qaHistory.push({
                                    id: liveAnswerId,
                                    question: liveInputBuffer.trim(),
                                    answer: liveOutputBuffer.trim(),
                                    chunks: [],
                                    isLive: true,
                                    timestamp: new Date()
                                });
                            }
                            liveAnswerId = null;
                            liveInputBuffer = '';
                            liveOutputBuffer = '';
                            if (isLiveMode) showListeningBubble();
                        }

                        // Audio de salida
                        if (sc.modelTurn && sc.modelTurn.parts) {
                            for (const part of sc.modelTurn.parts) {
                                if (part.inlineData && part.inlineData.data) {
                                    playAudioChunk(part.inlineData.data);
                                }
                            }
                        }
                    }
                };

                liveWs.onerror = (error) => {
                    console.error('Live WebSocket error:', error);
                    addSystemMessage('Error de conexion en modo Live');
                    stopLiveMode();
                };

                liveWs.onclose = () => {
                    console.log('Live WebSocket closed');
                    if (isLiveMode) stopLiveMode();
                };

            } catch (e) {
                console.error('Error starting live mode:', e);
                stopLiveMode();
            }
        }

        function stopLiveMode() {
            const wasLive = isLiveMode;
            isLiveMode = false;
            updateLiveButtonUI(false);
            removeListeningBubble();

            if (liveWs) {
                liveWs.close();
                liveWs = null;
            }

            if (liveMediaStream) {
                liveMediaStream.getTracks().forEach(t => t.stop());
                liveMediaStream = null;
            }

            if (liveAudioWorklet) {
                liveAudioWorklet.disconnect();
                liveAudioWorklet = null;
            }

            if (liveAudioContext) {
                liveAudioContext.close();
                liveAudioContext = null;
            }

            stopAllLiveAudio();
            if (liveOutputCtx) {
                liveOutputCtx.close();
                liveOutputCtx = null;
            }

            liveAnswerId = null;
            liveInputBuffer = '';
            liveOutputBuffer = '';

            if (wasLive) {
                addSystemMessage('Finalizo Modo Live - Escribe para continuar.');
            }
        }

        async function startMicrophoneCapture() {
    try {
        console.log('[LIVE] Solicitando micrófono...');
        
        liveMediaStream = await navigator.mediaDevices.getUserMedia({ 
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true,
                sampleRate: 16000
            } 
        });
        console.log('[LIVE] Micrófono obtenido');

        liveAudioContext = new AudioContext({ sampleRate: 16000 });
        
        // En móvil, el AudioContext empieza suspendido
        if (liveAudioContext.state === 'suspended') {
            await liveAudioContext.resume();
            console.log('[LIVE] AudioContext resumido');
        }

        const source = liveAudioContext.createMediaStreamSource(liveMediaStream);

        // Intentar usar AudioWorklet (moderno), fallback a ScriptProcessor
        if (liveAudioContext.audioWorklet) {
            console.log('[LIVE] Usando AudioWorklet');
            
            // Crear el worklet inline como blob
            const workletCode = `
                class PCMEncoder extends AudioWorkletProcessor {
                    process(inputs, outputs, parameters) {
                        const input = inputs[0];
                        if (input.length > 0) {
                            const channelData = input[0];
                            const int16Data = new Int16Array(channelData.length);
                            for (let i = 0; i < channelData.length; i++) {
                                int16Data[i] = Math.max(-1, Math.min(1, channelData[i])) * 0x7FFF;
                            }
                            this.port.postMessage(int16Data.buffer, [int16Data.buffer]);
                        }
                        return true;
                    }
                }
                registerProcessor('pcm-encoder', PCMEncoder);
            `;
            
            const blob = new Blob([workletCode], { type: 'application/javascript' });
            const workletUrl = URL.createObjectURL(blob);
            
            await liveAudioContext.audioWorklet.addModule(workletUrl);
            
            const workletNode = new AudioWorkletNode(liveAudioContext, 'pcm-encoder');
            workletNode.port.onmessage = (e) => {
                if (!isLiveMode || !liveWs || liveWs.readyState !== WebSocket.OPEN) return;
                
                const base64 = arrayBufferToBase64(e.data);
                liveWs.send(JSON.stringify({
                    realtimeInput: {
                        audio: {
                            data: base64,
                            mimeType: 'audio/pcm;rate=16000'
                        }
                    }
                }));
            };
            
            source.connect(workletNode);
            liveAudioWorklet = workletNode;
            
        } else {
            // Fallback a ScriptProcessorNode (deprecated pero funcional)
            console.log('[LIVE] Fallback a ScriptProcessorNode');
            
            const bufferSize = 4096;
            const processor = liveAudioContext.createScriptProcessor(bufferSize, 1, 1);

            processor.onaudioprocess = (e) => {
                if (!isLiveMode || !liveWs || liveWs.readyState !== WebSocket.OPEN) return;

                const inputData = e.inputBuffer.getChannelData(0);
                const pcmData = new Int16Array(inputData.length);
                for (let i = 0; i < inputData.length; i++) {
                    pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                }

                const base64 = arrayBufferToBase64(pcmData.buffer);
                liveWs.send(JSON.stringify({
                    realtimeInput: {
                        audio: {
                            data: base64,
                            mimeType: 'audio/pcm;rate=16000'
                        }
                    }
                }));
            };

            source.connect(processor);
            processor.connect(liveAudioContext.destination);
            liveAudioWorklet = processor;
        }

        console.log('[LIVE] Captura de audio iniciada');

    } catch (e) {
        console.error('[LIVE] Error accediendo al micrófono:', e);
        addSystemMessage('No se pudo acceder al micrófono: ' + e.message);
        stopLiveMode();
    }
}

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        function ensureOutputContext() {
            if (!liveOutputCtx) {
                liveOutputCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                liveNextStartTime = liveOutputCtx.currentTime;
            }
            return liveOutputCtx;
        }

        function playAudioChunk(base64Data) {
            try {
                const ctx = ensureOutputContext();
                const binaryStr = atob(base64Data);
                const len = binaryStr.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) bytes[i] = binaryStr.charCodeAt(i);

                const view = new DataView(bytes.buffer);
                const sampleCount = Math.floor(len / 2);
                if (sampleCount === 0) return;

                const audioBuffer = ctx.createBuffer(1, sampleCount, 24000);
                const channelData = audioBuffer.getChannelData(0);
                for (let i = 0; i < sampleCount; i++) {
                    channelData[i] = view.getInt16(i * 2, true) / 32768;
                }

                const source = ctx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(ctx.destination);

                const now = ctx.currentTime;
                if (liveNextStartTime < now) liveNextStartTime = now;
                source.start(liveNextStartTime);
                liveNextStartTime += audioBuffer.duration;

                liveActiveSources.push(source);
                source.onended = () => {
                    const idx = liveActiveSources.indexOf(source);
                    if (idx !== -1) liveActiveSources.splice(idx, 1);
                };
            } catch (e) {
                console.error('Error reproduciendo audio:', e);
            }
        }

        function stopAllLiveAudio() {
            liveActiveSources.forEach(s => {
                try { s.stop(); } catch (e) { /* ya pudo haber terminado */ }
            });
            liveActiveSources = [];
            if (liveOutputCtx) liveNextStartTime = liveOutputCtx.currentTime;
        }

        async function sendLiveText(text) {
            if (!liveWs || liveWs.readyState !== WebSocket.OPEN) return;
            removeListeningBubble();
            liveInputBuffer = text;
            liveWs.send(JSON.stringify({
                realtimeInput: {
                    text: text
                }
            }));
        }

        // ===================================================================
        // INICIALIZACION
        // ===================================================================
        window.addEventListener('load', loadKB);
        document.getElementById('query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSubmit();
            }
        });

// ===================================================================
// PANTALLA COMPLETA EN DISPOSITIVOS TACTILES
// ===================================================================
(function initFullscreen() {
    // Detectar si es dispositivo tactil
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    if (!isTouchDevice) return; // Solo en tactiles

    // Al primer toque en cualquier parte, pedir pantalla completa
    function requestFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen().catch(() => {});
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
        }
    }

    // Escuchar el primer toque
    document.addEventListener('touchstart', requestFullscreen, { once: true });
})();
